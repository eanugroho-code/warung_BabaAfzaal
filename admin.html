<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Admin Merchant - Warung BabaAfzaal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --primary: #2c9c8c;
            --primary-dark: #1e7a6e;
            --primary-light: #e6f5f2;
            --primary-soft: #d0efe9;
            --secondary: #3b9eb3;
            --white: #ffffff;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        body {
            background: var(--gray-100);
            color: var(--gray-800);
            overflow-x: hidden;
        }

        /* App Container */
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Bottom Navigation (Mobile First) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 16px 20px;
            border-top: 1px solid var(--gray-200);
            box-shadow: var(--shadow-lg);
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.95);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
            transition: all 0.2s ease;
            color: var(--gray-500);
            font-size: 12px;
            font-weight: 500;
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-item.active {
            color: var(--primary);
            background: var(--primary-light);
        }

        .nav-item:active {
            transform: scale(0.95);
        }

        /* Top Header */
        .top-header {
            background: var(--white);
            padding: 16px 20px;
            border-bottom: 1px solid var(--gray-200);
            position: sticky;
            top: 0;
            z-index: 99;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-800);
        }

        .header-title p {
            font-size: 12px;
            color: var(--gray-500);
            margin-top: 2px;
        }

        .store-badge {
            background: var(--primary-light);
            padding: 8px 16px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
        }

        /* Main Content */
        .main-content {
            padding: 20px;
            padding-bottom: 90px;
            margin-bottom: 60px;
        }

        /* Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--white);
            border-radius: 20px;
            padding: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
            transition: transform 0.2s;
        }

        .stat-card:active {
            transform: scale(0.98);
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            background: var(--primary-light);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .stat-icon i {
            font-size: 22px;
            color: var(--primary);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--gray-800);
        }

        .stat-label {
            font-size: 12px;
            color: var(--gray-500);
            margin-top: 4px;
        }

        /* Section Card */
        .section-card {
            background: var(--white);
            border-radius: 24px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }

        .section-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--gray-200);
            flex-wrap: wrap;
            gap: 10px;
        }

        .section-header h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--gray-800);
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-add:active {
            transform: scale(0.96);
        }

        /* List Items */
        .product-list, .order-list, .carousel-list {
            padding: 0 16px;
        }

        .product-item, .order-item, .carousel-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--gray-200);
            gap: 12px;
        }

        .product-info, .order-info {
            flex: 1;
        }

        .product-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--gray-800);
        }

        .product-meta {
            font-size: 12px;
            color: var(--gray-500);
            margin-top: 4px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .order-customer {
            font-weight: 600;
            font-size: 14px;
        }

        .order-detail {
            font-size: 12px;
            color: var(--gray-500);
            margin-top: 4px;
        }

        .order-total {
            font-weight: 700;
            color: var(--primary);
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-pending { background: #fef3c7; color: #92400e; }
        .status-processing { background: #dbeafe; color: #1e40af; }
        .status-shipped { background: #dcfce7; color: #166534; }
        .status-completed { background: #e0e7ff; color: #3730a3; }
        .status-waiting { background: #fed7aa; color: #9b3412; }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            background: var(--gray-100);
            border: none;
            padding: 8px;
            border-radius: 40px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-icon:active {
            transform: scale(0.92);
        }

        .btn-icon.edit { color: var(--primary); }
        .btn-icon.delete { color: var(--danger); }
        .btn-icon.whatsapp { color: #25D366; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            border-radius: 28px 28px 0 0;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--white);
            z-index: 10;
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .close-modal {
            background: var(--gray-100);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        .modal-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--gray-700);
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--gray-300);
            border-radius: 16px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-save:active {
            transform: scale(0.98);
        }

        /* Order Detail Modal */
        .order-items-list {
            background: var(--gray-50);
            border-radius: 16px;
            padding: 12px;
            margin: 16px 0;
        }

        .order-item-detail {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--gray-200);
            font-size: 14px;
        }

        .order-address {
            background: var(--gray-50);
            padding: 12px;
            border-radius: 16px;
            margin: 16px 0;
            font-size: 13px;
            line-height: 1.5;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray-400);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* Desktop Styles */
        @media (min-width: 768px) {
            .bottom-nav {
                display: none;
            }

            .app-container {
                flex-direction: row;
            }

            /* Sidebar Desktop */
            .sidebar-desktop {
                width: 280px;
                background: var(--white);
                min-height: 100vh;
                position: sticky;
                top: 0;
                border-right: 1px solid var(--gray-200);
                padding: 24px 0;
            }

            .sidebar-logo {
                padding: 0 20px 24px;
                border-bottom: 1px solid var(--gray-200);
                margin-bottom: 20px;
            }

            .sidebar-logo h2 {
                color: var(--primary);
                font-size: 20px;
            }

            .sidebar-menu {
                display: flex;
                flex-direction: column;
                gap: 4px;
            }

            .sidebar-item {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 20px;
                background: none;
                border: none;
                width: 100%;
                text-align: left;
                cursor: pointer;
                font-size: 14px;
                font-weight: 500;
                color: var(--gray-600);
                transition: all 0.2s;
            }

            .sidebar-item i {
                width: 24px;
                font-size: 18px;
            }

            .sidebar-item.active {
                background: var(--primary-light);
                color: var(--primary);
                border-right: 3px solid var(--primary);
            }

            .main-content {
                flex: 1;
                padding: 24px 32px;
                margin-bottom: 0;
            }

            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
            }

            .section-card {
                margin-bottom: 28px;
            }

            .modal-content {
                border-radius: 28px;
                margin: auto;
                max-width: 550px;
            }

            .modal {
                align-items: center;
            }
        }

        /* Loading & Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gray-800);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1100;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @media (min-width: 768px) {
            .toast {
                bottom: 30px;
            }
        }

        .whatsapp-link {
            background: #25D366;
            color: white;
            padding: 10px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Desktop Sidebar -->
        <div class="sidebar-desktop" id="sidebarDesktop">
            <div class="sidebar-logo">
                <h2><i class="fas fa-store"></i> BabaAfzaal</h2>
                <p style="font-size: 12px; color: var(--gray-500); margin-top: 4px;">Merchant Panel</p>
            </div>
            <div class="sidebar-menu">
                <button class="sidebar-item active" data-page="dashboard">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </button>
                <button class="sidebar-item" data-page="orders">
                    <i class="fas fa-shopping-cart"></i> Pesanan
                    <span id="pendingBadgeDesktop" style="margin-left:auto; background:var(--danger); color:white; padding:2px 8px; border-radius:20px; font-size:11px; display:none"></span>
                </button>
                <button class="sidebar-item" data-page="products">
                    <i class="fas fa-box"></i> Produk
                </button>
                <button class="sidebar-item" data-page="carousel">
                    <i class="fas fa-images"></i> Banner
                </button>
                <button class="sidebar-item" data-page="verification">
                    <i class="fas fa-clock"></i> Verifikasi Ongkir
                </button>
                <button class="sidebar-item" data-page="settings">
                    <i class="fas fa-cog"></i> Pengaturan
                </button>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Top Header Mobile -->
            <div class="top-header">
                <div class="header-title">
                    <h1 id="mobilePageTitle">Dashboard</h1>
                    <p id="mobilePageSub">Kelola toko Anda</p>
                </div>
                <div class="store-badge">
                    <i class="fas fa-store"></i>
                    <span>Warung BabaAfzaal</span>
                </div>
            </div>

            <!-- Dynamic Content -->
            <div id="pageContent"></div>
        </div>

        <!-- Bottom Navigation Mobile -->
        <div class="bottom-nav">
            <button class="nav-item active" data-page="dashboard">
                <i class="fas fa-tachometer-alt"></i>
                <span>Beranda</span>
            </button>
            <button class="nav-item" data-page="orders">
                <i class="fas fa-shopping-cart"></i>
                <span>Pesanan</span>
                <span id="pendingBadgeMobile" style="background:var(--danger); color:white; padding:2px 6px; border-radius:20px; font-size:10px; margin-left:4px; display:none"></span>
            </button>
            <button class="nav-item" data-page="products">
                <i class="fas fa-box"></i>
                <span>Produk</span>
            </button>
            <button class="nav-item" data-page="more">
                <i class="fas fa-ellipsis-h"></i>
                <span>Lainnya</span>
            </button>
        </div>
    </div>

    <!-- Modal Tambah/Edit Produk -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="productModalTitle">Tambah Produk</h3>
                <button class="close-modal" onclick="closeProductModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="productId">
                <div class="form-group"><label>Nama Produk</label><input type="text" id="productName" placeholder="Contoh: Kopi Arabika"></div>
                <div class="form-group"><label>Deskripsi</label><textarea id="productDesc" rows="2" placeholder="Deskripsi produk"></textarea></div>
                <div class="form-group"><label>Harga (Rp)</label><input type="number" id="productPrice" placeholder="Harga"></div>
                <div class="form-group"><label>Kategori</label><select id="productCategory"><option>Makanan</option><option>Minuman</option><option>Kesehatan</option></select></div>
                <div class="form-group"><label>Icon (Font Awesome)</label><input type="text" id="productIcon" placeholder="fas fa-mug-hot"></div>
                <div class="form-group"><label>Stok</label><input type="number" id="productStock" placeholder="Stok"></div>
                <button class="btn-save" onclick="saveProduct()">Simpan Produk</button>
            </div>
        </div>
    </div>

    <!-- Modal Tambah/Edit Carousel -->
    <div class="modal" id="carouselModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="carouselModalTitle">Tambah Banner</h3>
                <button class="close-modal" onclick="closeCarouselModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="carouselId">
                <div class="form-group"><label>Judul Banner</label><input type="text" id="carouselTitle" placeholder="Judul"></div>
                <div class="form-group"><label>Deskripsi</label><textarea id="carouselDesc" rows="2" placeholder="Deskripsi"></textarea></div>
                <button class="btn-save" onclick="saveCarousel()">Simpan Banner</button>
            </div>
        </div>
    </div>

    <!-- Modal Detail Pesanan -->
    <div class="modal" id="orderDetailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Detail Pesanan</h3>
                <button class="close-modal" onclick="closeOrderDetailModal()">&times;</button>
            </div>
            <div class="modal-body" id="orderDetailContent"></div>
        </div>
    </div>

    <!-- Modal Kirim Link Verifikasi -->
    <div class="modal" id="verificationModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Verifikasi Ongkir</h3>
                <button class="close-modal" onclick="closeVerificationModal()">&times;</button>
            </div>
            <div class="modal-body" id="verificationContent"></div>
        </div>
    </div>

    <script>
        // Data
        let products = [];
        let orders = [];
        let pendingVerifications = [];
        let carouselSlides = [];
        let currentPage = 'dashboard';
        let currentVerificationOrder = null;

        // Load all data
        function loadData() {
            products = JSON.parse(localStorage.getItem('babaafzaal_products') || '[]');
            orders = JSON.parse(localStorage.getItem('babaafzaal_orders') || '[]');
            pendingVerifications = JSON.parse(localStorage.getItem('babaafzaal_pending_verification') || '[]');
            carouselSlides = JSON.parse(localStorage.getItem('babaafzaal_carousel') || '[]');
            
            if(products.length === 0) {
                products = [
                    { id:1, name:"Kopi Arabika Premium", description:"Kopi arabika pilihan", price:85000, category:"Minuman", icon:"fas fa-mug-hot", stock:50, views:245, sold:120 },
                    { id:2, name:"Madu Asli Hutan", description:"Madu murni", price:125000, category:"Makanan", icon:"fas fa-honey-pot", stock:30, views:189, sold:85 }
                ];
                localStorage.setItem('babaafzaal_products', JSON.stringify(products));
            }
            if(carouselSlides.length === 0) {
                carouselSlides = [
                    { id:1, title:"Selamat Datang", description:"Belanja praktis dan aman" }
                ];
                localStorage.setItem('babaafzaal_carousel', JSON.stringify(carouselSlides));
            }
            updatePendingBadge();
        }

        function updatePendingBadge() {
            const pendingCount = pendingVerifications.length;
            const mobileBadge = document.getElementById('pendingBadgeMobile');
            const desktopBadge = document.getElementById('pendingBadgeDesktop');
            if(pendingCount > 0) {
                if(mobileBadge) { mobileBadge.style.display = 'inline-block'; mobileBadge.innerText = pendingCount; }
                if(desktopBadge) { desktopBadge.style.display = 'inline-block'; desktopBadge.innerText = pendingCount; }
            } else {
                if(mobileBadge) mobileBadge.style.display = 'none';
                if(desktopBadge) desktopBadge.style.display = 'none';
            }
        }

        // Render Dashboard
        function renderDashboard() {
            const totalProducts = products.length;
            const totalOrders = orders.length;
            const totalRevenue = orders.reduce((sum, o) => sum + o.total, 0);
            const pendingVerif = pendingVerifications.length;
            
            document.getElementById('pageContent').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-box"></i></div><div class="stat-value">${totalProducts}</div><div class="stat-label">Total Produk</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-shopping-cart"></i></div><div class="stat-value">${totalOrders}</div><div class="stat-label">Pesanan Selesai</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-value">${pendingVerif}</div><div class="stat-label">Perlu Verifikasi</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-line"></i></div><div class="stat-value">Rp ${totalRevenue.toLocaleString('id-ID')}</div><div class="stat-label">Pendapatan</div></div>
                </div>
                <div class="section-card">
                    <div class="section-header"><h3><i class="fas fa-clock"></i> Perlu Verifikasi Ongkir</h3></div>
                    <div class="order-list" id="pendingVerifList"></div>
                </div>
                <div class="section-card">
                    <div class="section-header"><h3><i class="fas fa-history"></i> Pesanan Terbaru</h3></div>
                    <div class="order-list" id="recentOrdersList"></div>
                </div>
            `;
            
            // Render pending verifications
            const pendingList = document.getElementById('pendingVerifList');
            if(pendingVerifications.length === 0) {
                pendingList.innerHTML = '<div class="empty-state"><i class="fas fa-check-circle"></i><p>Tidak ada pesanan menunggu verifikasi</p></div>';
            } else {
                pendingList.innerHTML = pendingVerifications.map(p => `
                    <div class="order-item">
                        <div class="order-info">
                            <div class="order-customer">${p.customerName}</div>
                            <div class="order-detail">${p.items.length} produk | ID: ${p.id}</div>
                            <div class="order-total">Subtotal: Rp ${p.subtotal.toLocaleString('id-ID')}</div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn-icon whatsapp" onclick="openVerificationModal('${p.id}')"><i class="fab fa-whatsapp"></i></button>
                        </div>
                    </div>
                `).join('');
            }
            
            // Recent orders
            const recentList = document.getElementById('recentOrdersList');
            const recent = [...orders].reverse().slice(0,5);
            if(recent.length === 0) {
                recentList.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>Belum ada pesanan</p></div>';
            } else {
                recentList.innerHTML = recent.map(o => `
                    <div class="order-item">
                        <div class="order-info">
                            <div class="order-customer">${o.customerName}</div>
                            <div class="order-detail">${o.items.length} produk | ${o.date}</div>
                            <div class="order-total">Rp ${o.total.toLocaleString('id-ID')}</div>
                        </div>
                        <div class="action-buttons">
                            <span class="status-badge status-${o.status}">${o.status === 'processing' ? 'Diproses' : o.status === 'shipped' ? 'Dikirim' : 'Selesai'}</span>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Render Products
        function renderProducts() {
            document.getElementById('pageContent').innerHTML = `
                <div class="section-card">
                    <div class="section-header">
                        <h3><i class="fas fa-box"></i> Daftar Produk</h3>
                        <button class="btn-add" onclick="openProductModal()"><i class="fas fa-plus"></i> Tambah</button>
                    </div>
                    <div class="product-list" id="productsList"></div>
                </div>
            `;
            const list = document.getElementById('productsList');
            if(products.length === 0) {
                list.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i><p>Belum ada produk</p></div>';
            } else {
                list.innerHTML = products.map(p => `
                    <div class="product-item">
                        <div class="product-info">
                            <div class="product-name"><i class="${p.icon}"></i> ${p.name}</div>
                            <div class="product-meta">
                                <span>Rp ${p.price.toLocaleString('id-ID')}</span>
                                <span>Stok: ${p.stock}</span>
                                <span>Terjual: ${p.sold || 0}</span>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn-icon edit" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon delete" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Render Orders
        function renderOrders() {
            document.getElementById('pageContent').innerHTML = `
                <div class="section-card">
                    <div class="section-header"><h3><i class="fas fa-shopping-cart"></i> Semua Pesanan</h3></div>
                    <div class="order-list" id="allOrdersList"></div>
                </div>
            `;
            const list = document.getElementById('allOrdersList');
            if(orders.length === 0 && pendingVerifications.length === 0) {
                list.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>Belum ada pesanan</p></div>';
            } else {
                let html = '';
                pendingVerifications.forEach(p => {
                    html += `
                        <div class="order-item">
                            <div class="order-info">
                                <div class="order-customer">⚠️ ${p.customerName}</div>
                                <div class="order-detail">ID: ${p.id} | Menunggu Verifikasi</div>
                                <div class="order-total">Subtotal: Rp ${p.subtotal.toLocaleString('id-ID')}</div>
                            </div>
                            <div class="action-buttons">
                                <button class="btn-icon whatsapp" onclick="openVerificationModal('${p.id}')"><i class="fab fa-whatsapp"></i></button>
                            </div>
                        </div>
                    `;
                });
                [...orders].reverse().forEach(o => {
                    html += `
                        <div class="order-item">
                            <div class="order-info">
                                <div class="order-customer">${o.customerName}</div>
                                <div class="order-detail">${o.items.length} produk | ${o.date}</div>
                                <div class="order-total">Rp ${o.total.toLocaleString('id-ID')}</div>
                            </div>
                            <div class="action-buttons">
                                <select onchange="updateOrderStatus('${o.id}', this.value)" style="padding:6px 10px; border-radius:30px; font-size:12px; border:1px solid var(--gray-300)">
                                    <option value="processing" ${o.status === 'processing' ? 'selected' : ''}>Diproses</option>
                                    <option value="shipped" ${o.status === 'shipped' ? 'selected' : ''}>Dikirim</option>
                                    <option value="completed" ${o.status === 'completed' ? 'selected' : ''}>Selesai</option>
                                </select>
                                <button class="btn-icon" onclick="viewOrderDetail('${o.id}')"><i class="fas fa-eye"></i></button>
                            </div>
                        </div>
                    `;
                });
                list.innerHTML = html;
            }
        }

        // Render Carousel
        function renderCarousel() {
            document.getElementById('pageContent').innerHTML = `
                <div class="section-card">
                    <div class="section-header">
                        <h3><i class="fas fa-images"></i> Banner Carousel</h3>
                        <button class="btn-add" onclick="openCarouselModal()"><i class="fas fa-plus"></i> Tambah</button>
                    </div>
                    <div class="carousel-list" id="carouselList"></div>
                </div>
            `;
            const list = document.getElementById('carouselList');
            if(carouselSlides.length === 0) {
                list.innerHTML = '<div class="empty-state"><i class="fas fa-image"></i><p>Belum ada banner</p></div>';
            } else {
                list.innerHTML = carouselSlides.map(s => `
                    <div class="product-item">
                        <div class="product-info">
                            <div class="product-name">📸 ${s.title}</div>
                            <div class="product-meta">${s.description}</div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn-icon edit" onclick="editCarousel(${s.id})"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon delete" onclick="deleteCarousel(${s.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Render Verification Page
        function renderVerification() {
            document.getElementById('pageContent').innerHTML = `
                <div class="section-card">
                    <div class="section-header"><h3><i class="fas fa-clock"></i> Verifikasi Ongkir</h3></div>
                    <div class="order-list" id="verifList"></div>
                </div>
            `;
            const list = document.getElementById('verifList');
            if(pendingVerifications.length === 0) {
                list.innerHTML = '<div class="empty-state"><i class="fas fa-check-circle"></i><p>Semua pesanan sudah diverifikasi</p></div>';
            } else {
                list.innerHTML = pendingVerifications.map(p => `
                    <div class="order-item">
                        <div class="order-info">
                            <div class="order-customer">${p.customerName}</div>
                            <div class="order-detail">ID: ${p.id} | ${p.items.length} produk</div>
                            <div class="order-detail">📍 ${p.address?.label || 'Alamat'} - ${p.address?.detail || ''}</div>
                            <div class="order-total">Subtotal: Rp ${p.subtotal.toLocaleString('id-ID')}</div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn-icon whatsapp" onclick="openVerificationModal('${p.id}')"><i class="fab fa-whatsapp"></i> Kirim Link</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Render Settings
        function renderSettings() {
            const whatsapp = JSON.parse(localStorage.getItem('babaafzaal_whatsapp') || '{"number":"6281234567890"}');
            document.getElementById('pageContent').innerHTML = `
                <div class="section-card">
                    <div class="section-header"><h3><i class="fas fa-cog"></i> Pengaturan Toko</h3></div>
                    <div class="modal-body">
                        <div class="form-group"><label>Nomor WhatsApp Admin</label><input type="tel" id="whatsappNumber" value="${whatsapp.number}" placeholder="6281234567890"></div>
                        <div class="form-group"><label>Nama Toko</label><input type="text" id="storeName" value="Warung BabaAfzaal"></div>
                        <button class="btn-save" onclick="saveSettings()">Simpan Pengaturan</button>
                    </div>
                </div>
            `;
        }

        // Render "More" page for mobile
        function renderMore() {
            document.getElementById('pageContent').innerHTML = `
                <div class="section-card">
                    <div class="section-header"><h3><i class="fas fa-ellipsis-h"></i> Menu Lainnya</h3></div>
                    <div style="padding: 8px 16px;">
                        <button class="sidebar-item" style="width:100%; justify-content:flex-start; gap:12px; padding:16px;" onclick="navigateTo('carousel')">
                            <i class="fas fa-images"></i> Banner Carousel
                        </button>
                        <button class="sidebar-item" style="width:100%; justify-content:flex-start; gap:12px; padding:16px;" onclick="navigateTo('verification')">
                            <i class="fas fa-clock"></i> Verifikasi Ongkir
                        </button>
                        <button class="sidebar-item" style="width:100%; justify-content:flex-start; gap:12px; padding:16px;" onclick="navigateTo('settings')">
                            <i class="fas fa-cog"></i> Pengaturan
                        </button>
                    </div>
                </div>
            `;
        }

        // CRUD Products
        function openProductModal(editId = null) {
            if(editId) {
                const p = products.find(p => p.id === editId);
                if(p) {
                    document.getElementById('productModalTitle').innerText = 'Edit Produk';
                    document.getElementById('productId').value = p.id;
                    document.getElementById('productName').value = p.name;
                    document.getElementById('productDesc').value = p.description;
                    document.getElementById('productPrice').value = p.price;
                    document.getElementById('productCategory').value = p.category;
                    document.getElementById('productIcon').value = p.icon;
                    document.getElementById('productStock').value = p.stock;
                }
            } else {
                document.getElementById('productModalTitle').innerText = 'Tambah Produk';
                document.getElementById('productId').value = '';
                document.getElementById('productName').value = '';
                document.getElementById('productDesc').value = '';
                document.getElementById('productPrice').value = '';
                document.getElementById('productCategory').value = 'Makanan';
                document.getElementById('productIcon').value = 'fas fa-box';
                document.getElementById('productStock').value = '';
            }
            document.getElementById('productModal').classList.add('show');
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.remove('show');
        }

        function saveProduct() {
            const id = document.getElementById('productId').value;
            const product = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('productName').value,
                description: document.getElementById('productDesc').value,
                price: parseInt(document.getElementById('productPrice').value),
                category: document.getElementById('productCategory').value,
                icon: document.getElementById('productIcon').value,
                stock: parseInt(document.getElementById('productStock').value),
                views: 0, sold: 0, rating: 0, ratingCount: 0
            };
            if(id) {
                const index = products.findIndex(p => p.id === parseInt(id));
                if(index !== -1) products[index] = { ...products[index], ...product };
            } else {
                products.push(product);
            }
            localStorage.setItem('babaafzaal_products', JSON.stringify(products));
            closeProductModal();
            renderProducts();
            showToast('Produk berhasil disimpan');
        }

        function editProduct(id) { openProductModal(id); }
        function deleteProduct(id) {
            if(confirm('Hapus produk ini?')) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('babaafzaal_products', JSON.stringify(products));
                renderProducts();
                showToast('Produk dihapus');
            }
        }

        // Carousel CRUD
        function openCarouselModal(editId = null) {
            if(editId) {
                const s = carouselSlides.find(s => s.id === editId);
                if(s) {
                    document.getElementById('carouselModalTitle').innerText = 'Edit Banner';
                    document.getElementById('carouselId').value = s.id;
                    document.getElementById('carouselTitle').value = s.title;
                    document.getElementById('carouselDesc').value = s.description;
                }
            } else {
                document.getElementById('carouselModalTitle').innerText = 'Tambah Banner';
                document.getElementById('carouselId').value = '';
                document.getElementById('carouselTitle').value = '';
                document.getElementById('carouselDesc').value = '';
            }
            document.getElementById('carouselModal').classList.add('show');
        }

        function closeCarouselModal() {
            document.getElementById('carouselModal').classList.remove('show');
        }

        function saveCarousel() {
            const id = document.getElementById('carouselId').value;
            const slide = {
                id: id ? parseInt(id) : Date.now(),
                title: document.getElementById('carouselTitle').value,
                description: document.getElementById('carouselDesc').value
            };
            if(id) {
                const index = carouselSlides.findIndex(s => s.id === parseInt(id));
                if(index !== -1) carouselSlides[index] = slide;
            } else {
                carouselSlides.push(slide);
            }
            localStorage.setItem('babaafzaal_carousel', JSON.stringify(carouselSlides));
            closeCarouselModal();
            renderCarousel();
            showToast('Banner disimpan');
        }

        function editCarousel(id) { openCarouselModal(id); }
        function deleteCarousel(id) {
            if(confirm('Hapus banner?')) {
                carouselSlides = carouselSlides.filter(s => s.id !== id);
                localStorage.setItem('babaafzaal_carousel', JSON.stringify(carouselSlides));
                renderCarousel();
                showToast('Banner dihapus');
            }
        }

        // Order management
        function updateOrderStatus(orderId, status) {
            const order = orders.find(o => o.id === orderId);
            if(order) {
                order.status = status;
                localStorage.setItem('babaafzaal_orders', JSON.stringify(orders));
                showToast('Status pesanan diupdate');
                renderOrders();
            }
        }

        function viewOrderDetail(orderId) {
            const order = orders.find(o => o.id === orderId);
            if(order) {
                document.getElementById('orderDetailContent').innerHTML = `
                    <div><strong>ID Pesanan:</strong> ${order.id}</div>
                    <div><strong>Tanggal:</strong> ${order.date}</div>
                    <div><strong>Pelanggan:</strong> ${order.customerName}</div>
                    <div><strong>WhatsApp:</strong> ${order.customerPhone}</div>
                    <div class="order-address"><strong>Alamat:</strong><br>${order.customerAddress}</div>
                    <div class="order-items-list">
                        <strong>Produk:</strong>
                        ${order.items.map(i => `<div class="order-item-detail"><span>${i.quantity}x ${i.name}</span><span>Rp ${(i.price * i.quantity).toLocaleString('id-ID')}</span></div>`).join('')}
                    </div>
                    <div><strong>Total Pembayaran:</strong> Rp ${order.total.toLocaleString('id-ID')}</div>
                    <div><strong>Metode Bayar:</strong> ${order.paymentMethod || 'COD'}</div>
                    <div><strong>Status:</strong> ${order.status === 'processing' ? 'Diproses' : order.status === 'shipped' ? 'Dikirim' : 'Selesai'}</div>
                `;
                document.getElementById('orderDetailModal').classList.add('show');
            }
        }

        function closeOrderDetailModal() {
            document.getElementById('orderDetailModal').classList.remove('show');
        }

        // Verification - Send WhatsApp link
        function openVerificationModal(orderId) {
            const order = pendingVerifications.find(p => p.id === orderId);
            if(order) {
                currentVerificationOrder = order;
                const baseUrl = window.location.origin + window.location.pathname.replace('admin.html', 'index.html');
                const paymentLink = `${baseUrl}?pay=${order.id}&shipping=`;
                
                document.getElementById('verificationContent').innerHTML = `
                    <div class="form-group">
                        <label>Biaya Ongkos Kirim (Rp)</label>
                        <input type="number" id="shippingCost" placeholder="Masukkan ongkir" value="15000">
                    </div>
                    <div class="form-group">
                        <label>Link Pembayaran (akan dikirim ke customer)</label>
                        <div style="background:var(--gray-100); padding:12px; border-radius:16px; font-size:12px; word-break:break-all; margin-bottom:12px">
                            ${baseUrl}?pay=${order.id}&shipping=<span id="shippingPreview">15000</span>
                        </div>
                    </div>
                    <button class="btn-save" onclick="sendVerificationLink()">
                        <i class="fab fa-whatsapp"></i> Kirim ke WhatsApp
                    </button>
                `;
                
                const shippingInput = document.getElementById('shippingCost');
                shippingInput.addEventListener('input', function() {
                    document.getElementById('shippingPreview').innerText = this.value;
                });
                
                document.getElementById('verificationModal').classList.add('show');
            }
        }

        function sendVerificationLink() {
            const shipping = document.getElementById('shippingCost').value;
            const baseUrl = window.location.origin + window.location.pathname.replace('admin.html', 'index.html');
            const paymentLink = `${baseUrl}?pay=${currentVerificationOrder.id}&shipping=${shipping}`;
            
            const itemsText = currentVerificationOrder.items.map(i => `- ${i.quantity}x ${i.name} = Rp ${(i.price*i.quantity).toLocaleString('id-ID')}`).join('\n');
            const message = `*VERIFIKASI PESANAN*\n\nHalo ${currentVerificationOrder.customerName},\n\nPesanan Anda dengan ID: *${currentVerificationOrder.id}* telah kami verifikasi.\n\n📦 *Detail Pesanan:*\n${itemsText}\n\n📍 *Alamat:* ${currentVerificationOrder.address?.label || 'Alamat'} - ${currentVerificationOrder.address?.detail || ''}\n\n🚚 *Ongkos Kirim:* Rp ${parseInt(shipping).toLocaleString('id-ID')}\n💰 *Total yang harus dibayar:* Rp ${(currentVerificationOrder.subtotal + parseInt(shipping)).toLocaleString('id-ID')}\n\n✅ *Silakan klik link berikut untuk melanjutkan pembayaran:*\n${paymentLink}\n\nSetelah pembayaran dikonfirmasi, pesanan akan sekami proses. Terima kasih!`;
            
            const whatsappNumber = currentVerificationOrder.customerPhone;
            window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`, '_blank');
            
            // Move to orders after sending
            const updatedOrder = {
                id: currentVerificationOrder.id,
                date: new Date().toLocaleString('id-ID'),
                customerName: currentVerificationOrder.customerName,
                customerPhone: currentVerificationOrder.customerPhone,
                customerAddress: currentVerificationOrder.address?.detail || '',
                items: currentVerificationOrder.items,
                total: currentVerificationOrder.subtotal + parseInt(shipping),
                status: 'processing',
                paymentMethod: 'pending'
            };
            orders.push(updatedOrder);
            localStorage.setItem('babaafzaal_orders', JSON.stringify(orders));
            
            // Remove from pending
            pendingVerifications = pendingVerifications.filter(p => p.id !== currentVerificationOrder.id);
            localStorage.setItem('babaafzaal_pending_verification', JSON.stringify(pendingVerifications));
            
            closeVerificationModal();
            updatePendingBadge();
            if(currentPage === 'dashboard') renderDashboard();
            else if(currentPage === 'orders') renderOrders();
            else if(currentPage === 'verification') renderVerification();
            showToast('Link verifikasi telah dikirim ke customer');
        }

        function closeVerificationModal() {
            document.getElementById('verificationModal').classList.remove('show');
        }

        // Settings
        function saveSettings() {
            const whatsapp = document.getElementById('whatsappNumber').value;
            localStorage.setItem('babaafzaal_whatsapp', JSON.stringify({ number: whatsapp }));
            showToast('Pengaturan disimpan');
        }

        // Navigation
        function navigateTo(page) {
            currentPage = page;
            const titles = { dashboard: 'Dashboard', products: 'Produk', orders: 'Pesanan', carousel: 'Banner', verification: 'Verifikasi', settings: 'Pengaturan', more: 'Menu' };
            const subs = { dashboard: 'Kelola toko Anda', products: 'Atur produk yang dijual', orders: 'Lihat dan kelola pesanan', carousel: 'Kelola banner carousel', verification: 'Verifikasi ongkir pesanan', settings: 'Pengaturan toko', more: 'Menu lainnya' };
            document.getElementById('mobilePageTitle').innerText = titles[page] || 'Dashboard';
            document.getElementById('mobilePageSub').innerText = subs[page] || '';
            
            // Update active states
            document.querySelectorAll('.nav-item, .sidebar-item').forEach(el => {
                if(el.getAttribute('data-page') === page) el.classList.add('active');
                else el.classList.remove('active');
            });
            
            if(page === 'dashboard') renderDashboard();
            else if(page === 'products') renderProducts();
            else if(page === 'orders') renderOrders();
            else if(page === 'carousel') renderCarousel();
            else if(page === 'verification') renderVerification();
            else if(page === 'settings') renderSettings();
            else if(page === 'more') renderMore();
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        // Initialize navigation
        document.querySelectorAll('.nav-item, .sidebar-item').forEach(btn => {
            btn.addEventListener('click', () => {
                const page = btn.getAttribute('data-page');
                if(page) navigateTo(page);
            });
        });

        // Close modals on outside click
        window.onclick = function(e) {
            if(e.target.classList.contains('modal')) {
                e.target.classList.remove('show');
            }
        }

        // Load data and start
        loadData();
        navigateTo('dashboard');
    </script>
</body>
</html>
