<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Warung BabaAfzaal - Jajan Online</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">
    <style>
        /* Reset & Base - Warna: Putih, Biru Tosca, Gold, Abu-abu (Tanpa Hitam) */
        :root {
            --pure-white: #ffffff;
            --off-white: #f8f9fa;
            --soft-gray: #eef2f3;
            --dark-gray: #2d3748;
            --medium-gray: #4a5568;
            --light-gray: #cbd5e0;
            --teal: #008080;      /* Biru Tosca */
            --teal-light: #20b2aa;
            --teal-dark: #006666;
            --teal-soft: #e6f3f3;
            --gold: #ffd700;
            --gold-dark: #daa520;
            --gold-light: #fff8e7;
            --charcoal: #2c3e50;
            --border-color: #e2e8f0;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 5px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.12);
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }
        
        body {
            background-color: var(--off-white);
            color: var(--dark-gray);
            line-height: 1.5;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Header - Tanpa Hitam */
        header {
            background: var(--charcoal);
            color: var(--pure-white);
            padding: 14px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-md);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo i {
            font-size: 26px;
            color: var(--gold);
        }
        
        .logo h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: var(--pure-white);
        }
        
        .logo span {
            color: var(--teal-light);
            font-weight: 500;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .cart-icon {
            position: relative;
            font-size: 20px;
            cursor: pointer;
            transition: var(--transition);
            padding: 8px;
            border-radius: 50%;
            background: var(--teal);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--pure-white);
        }
        
        .cart-icon:hover {
            background: var(--teal-dark);
            transform: scale(1.02);
        }
        
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--gold);
            color: var(--charcoal);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
            border: 2px solid var(--pure-white);
        }
        
        .check-order-btn {
            background: var(--teal);
            color: var(--pure-white);
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .check-order-btn:hover {
            background: var(--teal-dark);
            transform: translateY(-2px);
        }
        
        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--pure-white);
            font-size: 22px;
            cursor: pointer;
        }
        
        /* Carousel */
        .carousel-section {
            background: var(--charcoal);
            margin-bottom: 50px;
            position: relative;
            overflow: hidden;
        }
        
        .swiper {
            width: 100%;
            height: 450px;
        }
        
        .swiper-slide {
            background: var(--charcoal);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .carousel-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.3;
        }
        
        .carousel-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: var(--pure-white);
            padding: 0 20px;
            max-width: 700px;
        }
        
        .carousel-title {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, var(--gold), var(--teal-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .carousel-description {
            font-size: 18px;
            margin-bottom: 25px;
            color: var(--off-white);
        }
        
        .swiper-button-next, .swiper-button-prev {
            color: var(--gold) !important;
            background: rgba(0,0,0,0.3);
            width: 44px !important;
            height: 44px !important;
            border-radius: 50%;
        }
        
        .swiper-pagination-bullet-active {
            background: var(--gold) !important;
        }
        
        /* Products Section */
        .products-section {
            padding: 50px 0 80px;
            background: var(--off-white);
        }
        
        .section-title {
            text-align: center;
            font-size: 32px;
            margin-bottom: 40px;
            color: var(--charcoal);
            font-weight: 800;
            position: relative;
        }
        
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, var(--teal), var(--gold));
            border-radius: 3px;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }
        
        /* ========== PRODUCT CARD - 2 BAGIAN DI MOBILE ========== */
        .product-card {
            background: var(--pure-white);
            border-radius: 20px;
            overflow: hidden;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: var(--teal);
        }
        
        /* BAGIAN 1: Gambar / Icon + Badge */
        .product-media {
            position: relative;
            background: linear-gradient(135deg, var(--teal-soft), var(--pure-white));
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            border-bottom: 2px solid var(--gold-light);
        }
        
        .product-image {
            width: 100%;
            height: 180px;
            object-fit: contain;
            transition: transform 0.4s ease;
        }
        
        .product-icon {
            font-size: 80px;
            color: var(--teal);
            transition: transform 0.3s;
        }
        
        .product-card:hover .product-icon {
            transform: scale(1.05);
            color: var(--gold-dark);
        }
        
        .product-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--gold);
            color: var(--charcoal);
            padding: 5px 12px;
            font-size: 11px;
            font-weight: 800;
            border-radius: 20px;
            z-index: 2;
            box-shadow: var(--shadow-sm);
        }
        
        /* BAGIAN 2: Informasi Produk + Tombol */
        .product-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
            background: var(--pure-white);
        }
        
        .product-category {
            font-size: 11px;
            color: var(--teal);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        
        .product-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--charcoal);
            line-height: 1.3;
        }
        
        .product-description {
            font-size: 13px;
            color: var(--medium-gray);
            margin-bottom: 12px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .product-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--teal-dark);
            margin-bottom: 12px;
            font-weight: 500;
        }
        
        .product-rating i {
            color: var(--gold);
            margin-right: 4px;
        }
        
        .product-price {
            font-size: 22px;
            font-weight: 800;
            color: var(--teal);
            margin-bottom: 16px;
        }
        
        .product-price span {
            font-size: 13px;
            font-weight: normal;
            color: var(--medium-gray);
        }
        
        .btn-detail {
            background: var(--teal);
            color: var(--pure-white);
            border: none;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            border-radius: 40px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-detail:hover {
            background: var(--teal-dark);
            transform: scale(1.02);
        }
        
        /* ========== RESPONSIVE MOBILE: 2 CARD PER BARIS ========== */
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 14px;
            }
            
            .product-media {
                min-height: 150px;
                padding: 12px;
            }
            
            .product-image {
                height: 120px;
            }
            
            .product-icon {
                font-size: 55px;
            }
            
            .product-info {
                padding: 14px;
            }
            
            .product-title {
                font-size: 14px;
                margin-bottom: 5px;
            }
            
            .product-description {
                font-size: 11px;
                margin-bottom: 8px;
                -webkit-line-clamp: 2;
            }
            
            .product-price {
                font-size: 16px;
                margin-bottom: 10px;
            }
            
            .btn-detail {
                padding: 8px;
                font-size: 11px;
            }
            
            .product-meta {
                font-size: 10px;
                margin-bottom: 8px;
                flex-wrap: wrap;
                gap: 6px;
            }
            
            .product-badge {
                font-size: 9px;
                padding: 3px 8px;
                top: 8px;
                left: 8px;
            }
            
            .section-title {
                font-size: 24px;
            }
            
            .carousel-title {
                font-size: 28px;
            }
            
            .carousel-description {
                font-size: 14px;
            }
            
            .swiper {
                height: 320px;
            }
        }
        
        @media (max-width: 480px) {
            .products-grid {
                gap: 10px;
            }
            
            .product-title {
                font-size: 13px;
            }
            
            .product-price {
                font-size: 14px;
            }
            
            .btn-detail {
                font-size: 10px;
                padding: 6px;
            }
            
            .product-media {
                min-height: 130px;
            }
            
            .product-icon {
                font-size: 45px;
            }
        }
        
        /* Status Section */
        .status-section {
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            padding: 50px 0;
            margin-bottom: 50px;
        }
        
        .status-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--pure-white);
        }
        
        .status-description {
            color: var(--gold-light);
            margin-bottom: 30px;
        }
        
        .status-form {
            display: flex;
            gap: 10px;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .status-input {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-size: 14px;
        }
        
        .status-btn {
            background: var(--gold);
            color: var(--charcoal);
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .status-btn:hover {
            background: var(--gold-dark);
            transform: translateY(-2px);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 2000;
            overflow-y: auto;
        }
        
        .modal-content {
            background: var(--pure-white);
            margin: 40px auto;
            width: 90%;
            max-width: 900px;
            border-radius: 24px;
            overflow: hidden;
            animation: modalFadeIn 0.3s ease;
        }
        
        .modal-header {
            background: var(--teal);
            color: var(--gold);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h2 {
            color: var(--pure-white);
        }
        
        .close-modal {
            font-size: 28px;
            cursor: pointer;
            transition: var(--transition);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: var(--pure-white);
        }
        
        .close-modal:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* Footer - Tanpa Hitam */
        footer {
            background: var(--charcoal);
            color: var(--pure-white);
            padding: 50px 0 30px;
            border-top: 3px solid var(--gold);
        }
        
        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .footer-section h3 {
            color: var(--gold);
            margin-bottom: 20px;
            font-size: 18px;
        }
        
        .footer-section p {
            color: var(--light-gray);
            line-height: 1.6;
        }
        
        .social-links {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        
        .social-links a {
            background: var(--teal);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: 0.3s;
        }
        
        .social-links a:hover {
            background: var(--gold);
            color: var(--charcoal);
            transform: translateY(-3px);
        }
        
        .floating-whatsapp {
            position: fixed;
            bottom: 25px;
            left: 25px;
            width: 55px;
            height: 55px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 999;
            transition: 0.3s;
        }
        
        .floating-whatsapp:hover {
            transform: scale(1.1);
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--charcoal);
            color: var(--gold);
            padding: 14px 20px;
            border-radius: 12px;
            display: none;
            z-index: 3000;
            border-left: 5px solid var(--gold);
            box-shadow: var(--shadow-md);
        }
        
        /* Utility */
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .payment-option.selected {
            border-color: var(--gold);
            background: var(--gold-light);
        }
        
        .btn-checkout {
            background: var(--teal);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .btn-checkout:hover {
            background: var(--teal-dark);
        }
        
        .empty-state {
            text-align: center;
            padding: 50px;
            color: var(--medium-gray);
            grid-column: 1 / -1;
        }
        
        .admin-link-hidden {
            text-align: center;
            margin-top: 20px;
            display: none;
        }
        
        .admin-link-hidden a {
            color: var(--gold);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo">
                <i class="fas fa-crown"></i>
                <h1><span>Warung</span> BabaAfzaal</h1>
            </div>
            <div class="header-actions">
                <button class="check-order-btn" onclick="openOrderStatus()"><i class="fas fa-search"></i> Cek Status</button>
                <div class="cart-icon" onclick="openCheckoutModal()">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </div>
        </div>
    </header>

    <section class="carousel-section">
        <div class="swiper">
            <div class="swiper-wrapper" id="carouselWrapper"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-pagination"></div>
        </div>
    </section>

    <section class="status-section">
        <div class="container status-container" style="text-align:center">
            <h2 class="status-title">CEK STATUS PESANAN</h2>
            <p class="status-description">Masukkan ID pesanan untuk melacak pesananmu</p>
            <div class="status-form">
                <input type="text" id="orderIdInput" class="status-input" placeholder="ORD-xxxxxx">
                <button class="status-btn" onclick="checkOrderStatus()"><i class="fas fa-search"></i> Cek</button>
            </div>
            <div id="orderResult" style="margin-top:20px; display:none;"></div>
        </div>
    </section>

    <section class="products-section">
        <div class="container">
            <h2 class="section-title">✨ PRODUK PILIHAN ✨</h2>
            <div class="products-grid" id="productsGrid"></div>
        </div>
    </section>

    <!-- Modals -->
    <div class="modal" id="productDetailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Detail Produk</h2>
                <span class="close-modal" onclick="closeProductDetailModal()">&times;</span>
            </div>
            <div class="modal-body" id="productDetailContent"></div>
        </div>
    </div>
    
    <div class="modal" id="checkoutModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Keranjang Belanja</h2>
                <span class="close-modal" onclick="closeCheckoutModal()">&times;</span>
            </div>
            <div class="modal-body" id="checkoutContent"></div>
        </div>
    </div>
    
    <div class="modal" id="orderConfirmationModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Pesanan Berhasil</h2>
                <span class="close-modal" onclick="closeOrderConfirmationModal()">&times;</span>
            </div>
            <div class="modal-body" id="orderConfirmationContent"></div>
        </div>
    </div>

    <footer id="mainFooter">
        <div class="container">
            <div class="footer-content" id="footerContent"></div>
            <div class="footer-bottom" style="text-align:center; color:var(--light-gray); padding-top:20px">
                <p id="footerCopyright"></p>
            </div>
        </div>
    </footer>

    <div class="floating-whatsapp" onclick="openWhatsAppChat()">
        <i class="fab fa-whatsapp"></i>
    </div>
    
    <div class="notification" id="notification"></div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
    <script>
        // Initialize Swiper
        const swiper = new Swiper('.swiper', {
            loop: true, 
            autoplay: { delay: 4000, disableOnInteraction: false }, 
            pagination: { el: '.swiper-pagination', clickable: true },
            navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' }
        });

        // Data
        let products = [];
        let cart = [];
        let carouselSlides = [];
        let footerData = {};
        let whatsappNumber = "6281234567890";

        // Load Carousel
        function loadCarousel() {
            const saved = localStorage.getItem('babaafzaal_carousel');
            carouselSlides = saved ? JSON.parse(saved) : [
                { title: "Selamat Datang di Warung BabaAfzaal", description: "Belanja praktis, aman & terpercaya dengan harga terbaik", image: "", bgColor: "#2c3e50" },
                { title: "Diskon Spesial Akhir Tahun", description: "Dapatkan harga terbaik untuk produk favoritmu", image: "", bgColor: "#006666" },
                { title: "Gratis Ongkir", description: "Minimal belanja Rp 150.000, gratis ongkir se-Jabodetabek", image: "", bgColor: "#daa520" }
            ];
            renderCarousel();
        }
        
        function renderCarousel() {
            const wrapper = document.getElementById('carouselWrapper');
            let html = '';
            carouselSlides.forEach(slide => {
                html += `
                    <div class="swiper-slide" style="background: ${slide.bgColor || '#2c3e50'}">
                        <div class="carousel-content">
                            <h2 class="carousel-title">${slide.title}</h2>
                            <p class="carousel-description">${slide.description}</p>
                        </div>
                    </div>
                `;
            });
            wrapper.innerHTML = html;
            swiper.update();
        }

        // Load Products
        function loadProducts() {
            const saved = localStorage.getItem('babaafzaal_products');
            if(saved) {
                products = JSON.parse(saved);
            } else {
                products = [
                    { id:1, name:"Kopi Arabika Premium", description:"Kopi arabika pilihan dengan rasa yang kaya dan aroma yang harum.", price:85000, category:"Minuman", stock:50, sold:120, rating:4.8, icon:"fas fa-mug-hot", image:"" },
                    { id:2, name:"Madu Asli Hutan", description:"Madu murni hasil dari lebah hutan dengan kualitas terbaik.", price:125000, category:"Makanan", stock:30, sold:85, rating:4.9, icon:"fas fa-honey-pot", image:"" },
                    { id:3, name:"Minyak Zaitun Extra Virgin", description:"Minyak zaitun extra virgin dengan kualitas premium untuk kesehatan.", price:185000, category:"Makanan", stock:25, sold:45, rating:4.7, icon:"fas fa-oil-can", image:"" },
                    { id:4, name:"Teh Herbal Jasmine", description:"Teh herbal dengan campuran bunga melati asli yang menenangkan.", price:65000, category:"Minuman", stock:75, sold:95, rating:4.6, icon:"fas fa-leaf", image:"" },
                    { id:5, name:"Kurma Medjool Premium", description:"Kurma medjool dengan ukuran besar dan rasa manis alami.", price:95000, category:"Makanan", stock:100, sold:210, rating:4.9, icon:"fas fa-apple-alt", image:"" },
                    { id:6, name:"Minyak Kelapa Murni VCO", description:"Minyak kelapa murni (VCO) dengan proses cold pressed.", price:75000, category:"Kesehatan", stock:40, sold:65, rating:4.8, icon:"fas fa-seedling", image:"" }
                ];
                localStorage.setItem('babaafzaal_products', JSON.stringify(products));
            }
            displayProducts();
        }
        
        function displayProducts() {
            const grid = document.getElementById('productsGrid');
            if(!products.length) {
                grid.innerHTML = '<div class="empty-state">Belum ada produk</div>';
                return;
            }
            
            let html = '';
            products.forEach(product => {
                html += `
                    <div class="product-card">
                        <div class="product-media">
                            ${product.image ? 
                                `<img src="${product.image}" class="product-image" alt="${product.name}">` : 
                                `<i class="${product.icon} product-icon"></i>`
                            }
                            ${product.stock < 5 ? '<div class="product-badge">TERBATAS</div>' : ''}
                        </div>
                        <div class="product-info">
                            <div class="product-category">${product.category}</div>
                            <div class="product-title">${product.name}</div>
                            <p class="product-description">${product.description.substring(0, 70)}...</p>
                            <div class="product-meta">
                                <span class="product-rating"><i class="fas fa-star"></i> ${product.rating}</span>
                                <span>Terjual ${product.sold}</span>
                                <span>Stok ${product.stock}</span>
                            </div>
                            <div class="product-price">Rp ${product.price.toLocaleString('id-ID')}</div>
                            <button class="btn-detail" onclick="showProductDetail(${product.id})">
                                <i class="fas fa-eye"></i> Lihat Detail
                            </button>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        // Show Product Detail
        function showProductDetail(id) {
            const product = products.find(p => p.id === id);
            if(!product) return;
            
            const detailHTML = `
                <div style="padding:25px">
                    <div style="text-align:center; margin-bottom:20px">
                        <i class="${product.icon}" style="font-size:80px; color:var(--teal)"></i>
                    </div>
                    <h2 style="color:var(--charcoal); margin-bottom:10px">${product.name}</h2>
                    <div class="product-category" style="margin-bottom:15px">${product.category}</div>
                    <p style="color:var(--medium-gray); line-height:1.6; margin-bottom:20px">${product.description}</p>
                    <div class="product-meta" style="margin-bottom:15px">
                        <span>⭐ ${product.rating}/5</span>
                        <span>📦 Terjual ${product.sold}</span>
                        <span>📊 Stok ${product.stock}</span>
                    </div>
                    <div class="product-price" style="font-size:28px; margin-bottom:25px">Rp ${product.price.toLocaleString('id-ID')}</div>
                    <button class="btn-detail" onclick="addToCart(${product.id})" style="width:100%">
                        <i class="fas fa-cart-plus"></i> Tambah ke Keranjang
                    </button>
                </div>
            `;
            document.getElementById('productDetailContent').innerHTML = detailHTML;
            document.getElementById('productDetailModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
        
        function closeProductDetailModal() {
            document.getElementById('productDetailModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        
        // Cart Functions
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if(!product) return;
            
            const existing = cart.find(item => item.productId === productId);
            if(existing) {
                existing.quantity++;
            } else {
                cart.push({
                    productId: product.id,
                    name: product.name,
                    price: product.price,
                    quantity: 1,
                    icon: product.icon
                });
            }
            saveCart();
            showNotification(`${product.name} ditambahkan ke keranjang`, 'success');
            closeProductDetailModal();
        }
        
        function saveCart() {
            localStorage.setItem('babaafzaal_cart', JSON.stringify(cart));
            updateCartCount();
        }
        
        function loadCart() {
            const saved = localStorage.getItem('babaafzaal_cart');
            cart = saved ? JSON.parse(saved) : [];
            updateCartCount();
        }
        
        function updateCartCount() {
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').innerText = total;
        }
        
        // Checkout
        function openCheckoutModal() {
            if(cart.length === 0) {
                showNotification('Keranjang belanja kosong', 'error');
                return;
            }
            
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const shipping = 10000;
            const total = subtotal + shipping;
            
            let itemsHtml = '';
            cart.forEach(item => {
                itemsHtml += `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid var(--border-color)">
                        <div style="display:flex; align-items:center; gap:10px">
                            <i class="${item.icon}" style="font-size:24px; color:var(--teal)"></i>
                            <div>
                                <div style="font-weight:700">${item.name}</div>
                                <div style="font-size:12px; color:var(--medium-gray)">${item.quantity}x</div>
                            </div>
                        </div>
                        <div style="font-weight:700">Rp ${(item.price * item.quantity).toLocaleString('id-ID')}</div>
                    </div>
                `;
            });
            
            const checkoutHTML = `
                <div style="padding:20px">
                    <h3 style="margin-bottom:15px; color:var(--teal)">🛒 Produk dalam Keranjang</h3>
                    ${itemsHtml}
                    <div style="margin:20px 0; padding:15px; background:var(--teal-soft); border-radius:16px">
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px">
                            <span>Subtotal</span>
                            <span>Rp ${subtotal.toLocaleString('id-ID')}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px">
                            <span>Ongkos Kirim</span>
                            <span>Rp ${shipping.toLocaleString('id-ID')}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-weight:800; font-size:18px; margin-top:10px; padding-top:10px; border-top:2px solid var(--gold)">
                            <span>TOTAL</span>
                            <span style="color:var(--teal)">Rp ${total.toLocaleString('id-ID')}</span>
                        </div>
                    </div>
                    
                    <input type="text" id="custName" placeholder="Nama Lengkap" class="status-input" style="width:100%; margin-bottom:12px">
                    <input type="tel" id="custPhone" placeholder="Nomor WhatsApp" class="status-input" style="width:100%; margin-bottom:12px">
                    <textarea id="custAddress" placeholder="Alamat Lengkap" rows="3" class="status-input" style="width:100%; margin-bottom:20px; border-radius:16px"></textarea>
                    
                    <button class="btn-checkout" onclick="processCheckout()" style="width:100%">
                        <i class="fas fa-check-circle"></i> BUAT PESANAN
                    </button>
                </div>
            `;
            
            document.getElementById('checkoutContent').innerHTML = checkoutHTML;
            document.getElementById('checkoutModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
        
        function closeCheckoutModal() {
            document.getElementById('checkoutModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        
        function processCheckout() {
            const name = document.getElementById('custName')?.value.trim();
            const phone = document.getElementById('custPhone')?.value.trim();
            const address = document.getElementById('custAddress')?.value.trim();
            
            if(!name || !phone || !address) {
                showNotification('Harap lengkapi semua data', 'error');
                return;
            }
            
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const total = subtotal + 10000;
            const orderId = 'ORD-' + Date.now().toString().slice(-8);
            const orderDate = new Date().toLocaleString('id-ID');
            
            const order = {
                id: orderId,
                date: orderDate,
                customerName: name,
                customerPhone: phone,
                customerAddress: address,
                items: [...cart],
                total: total,
                status: 'pending'
            };
            
            const orders = JSON.parse(localStorage.getItem('babaafzaal_orders') || '[]');
            orders.push(order);
            localStorage.setItem('babaafzaal_orders', JSON.stringify(orders));
            
            // Clear cart
            cart = [];
            saveCart();
            closeCheckoutModal();
            
            // Show confirmation
            const confirmationHTML = `
                <div style="padding:40px; text-align:center">
                    <i class="fas fa-check-circle" style="font-size:70px; color:var(--gold)"></i>
                    <h2 style="margin:20px 0; color:var(--teal)">Pesanan Berhasil!</h2>
                    <div style="background:var(--teal-soft); padding:20px; border-radius:16px; margin:20px 0">
                        <p style="font-size:14px; color:var(--medium-gray)">ID Pesanan Anda</p>
                        <p style="font-size:24px; font-weight:800; color:var(--charcoal)">${orderId}</p>
                    </div>
                    <p style="color:var(--medium-gray); margin-bottom:25px">Simpan ID pesanan untuk cek status nanti</p>
                    <button class="btn-detail" onclick="closeOrderConfirmationModal()" style="width:200px">
                        <i class="fas fa-check"></i> Selesai
                    </button>
                </div>
            `;
            
            document.getElementById('orderConfirmationContent').innerHTML = confirmationHTML;
            document.getElementById('orderConfirmationModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
        
        function closeOrderConfirmationModal() {
            document.getElementById('orderConfirmationModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        
        // Check Order Status
        function checkOrderStatus() {
            const orderId = document.getElementById('orderIdInput').value.trim();
            const resultDiv = document.getElementById('orderResult');
            
            if(!orderId) {
                showNotification('Masukkan ID pesanan', 'error');
                return;
            }
            
            const orders = JSON.parse(localStorage.getItem('babaafzaal_orders') || '[]');
            const order = orders.find(o => o.id === orderId);
            
            if(!order) {
                resultDiv.innerHTML = `
                    <div style="background:var(--pure-white); padding:20px; border-radius:16px; text-align:center">
                        <i class="fas fa-search" style="font-size:40px; color:var(--gold); margin-bottom:10px"></i>
                        <p>Pesanan dengan ID <strong>${orderId}</strong> tidak ditemukan</p>
                    </div>
                `;
                resultDiv.style.display = 'block';
                return;
            }
            
            let statusText = 'Pending';
            let statusColor = '#ffc107';
            if(order.status === 'processing') { statusText = 'Diproses'; statusColor = '#17a2b8'; }
            else if(order.status === 'shipped') { statusText = 'Dikirim'; statusColor = '#007bff'; }
            else if(order.status === 'completed') { statusText = 'Selesai'; statusColor = '#28a745'; }
            
            resultDiv.innerHTML = `
                <div style="background:var(--pure-white); padding:25px; border-radius:20px; text-align:left">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom:15px; border-bottom:2px solid var(--gold)">
                        <span style="font-weight:800; font-size:20px; color:var(--teal)">${order.id}</span>
                        <span style="background:${statusColor}; color:white; padding:5px 15px; border-radius:20px; font-size:12px; font-weight:700">${statusText}</span>
                    </div>
                    <p><strong>Nama:</strong> ${order.customerName}</p>
                    <p><strong>Telepon:</strong> ${order.customerPhone}</p>
                    <p><strong>Alamat:</strong> ${order.customerAddress}</p>
                    <p><strong>Tanggal:</strong> ${order.date}</p>
                    <div style="margin-top:15px; padding-top:15px; border-top:1px solid var(--border-color)">
                        <strong>Total Pembayaran: Rp ${order.total.toLocaleString('id-ID')}</strong>
                    </div>
                </div>
            `;
            resultDiv.style.display = 'block';
        }
        
        function openOrderStatus() {
            document.querySelector('.status-section').scrollIntoView({ behavior: 'smooth' });
            document.getElementById('orderIdInput').focus();
        }
        
        // Footer
        function loadFooter() {
            const saved = localStorage.getItem('babaafzaal_footer');
            footerData = saved ? JSON.parse(saved) : {
                sections: [
                    { title: "🏪 TENTANG KAMI", content: "Warung BabaAfzaal menyediakan produk berkualitas dengan harga terbaik. Melayani dengan sepenuh hati." },
                    { title: "📞 KONTAK", content: "WhatsApp: +62 812-3456-7890\nEmail: info@babaafzaal.com" },
                    { title: "⭐ LAYANAN", content: "✓ Pengiriman Cepat\n✓ Garansi Produk\n✓ Pembayaran Aman" }
                ],
                copyright: "© 2025 Warung BabaAfzaal. All rights reserved."
            };
            
            const footerContent = document.getElementById('footerContent');
            let html = '';
            footerData.sections.forEach(section => {
                html += `
                    <div class="footer-section">
                        <h3>${section.title}</h3>
                        <p style="white-space: pre-line">${section.content}</p>
                    </div>
                `;
            });
            footerContent.innerHTML = html;
            document.getElementById('footerCopyright').innerHTML = footerData.copyright;
        }
        
        // WhatsApp
        function openWhatsAppChat() {
            window.open(`https://wa.me/${whatsappNumber}?text=Halo%20saya%20ingin%20bertanya%20tentang%20produk%20di%20Warung%20BabaAfzaal`, '_blank');
        }
        
        // Notification
        function showNotification(message, type = 'success') {
            const notif = document.getElementById('notification');
            notif.innerHTML = message;
            notif.style.display = 'block';
            setTimeout(() => {
                notif.style.display = 'none';
            }, 3000);
        }
        
        // Close modals on outside click
        window.onclick = function(event) {
            const modals = ['productDetailModal', 'checkoutModal', 'orderConfirmationModal'];
            modals.forEach(id => {
                const modal = document.getElementById(id);
                if(event.target === modal) {
                    modal.style.display = 'none';
                    document.body.style.overflow = 'auto';
                }
            });
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadCarousel();
            loadProducts();
            loadCart();
            loadFooter();
        });
    </script>
</body>
</html>
