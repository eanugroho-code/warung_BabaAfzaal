<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Panel - Warung BabaAfzaal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        :root {
            --pure-white: #ffffff;
            --off-white: #f8f9fa;
            --pure-black: #000000;
            --charcoal: #1a1a1a;
            --dark-gray: #2d2d2d;
            --medium-gray: #4a4a4a;
            --light-gray: #e0e0e0;
            --soft-gray: #f5f5f5;
            --gold: #d4af37;
            --gold-dark: #b8960c;
            --gold-light: #f5e6a3;
            --gold-soft: #fef8e7;
            --border-color: #e8e8e8;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 15px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 25px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        body {
            background: var(--soft-gray);
            color: var(--charcoal);
        }

        /* Sidebar */
        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--pure-black);
            color: var(--pure-white);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: var(--transition);
            z-index: 100;
        }

        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .sidebar-header h2 {
            color: var(--gold);
            font-size: 22px;
            font-weight: 700;
        }

        .sidebar-header p {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .sidebar-menu {
            padding: 20px 0;
        }

        .menu-item {
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: var(--transition);
            color: #ccc;
            border-left: 3px solid transparent;
        }

        .menu-item i {
            width: 24px;
            font-size: 18px;
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.08);
            color: var(--gold);
        }

        .menu-item.active {
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
            border-left-color: var(--gold);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 20px 30px;
        }

        /* Top Bar */
        .top-bar {
            background: var(--pure-white);
            border-radius: 16px;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--pure-black);
        }

        .page-title i {
            color: var(--gold);
            margin-right: 10px;
        }

        .logout-btn {
            background: var(--pure-black);
            color: var(--gold);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn:hover {
            background: var(--gold);
            color: var(--pure-black);
        }

        /* Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--pure-white);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: var(--gold);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            background: var(--gold-soft);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .stat-icon i {
            font-size: 24px;
            color: var(--gold);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--pure-black);
        }

        .stat-label {
            font-size: 14px;
            color: var(--medium-gray);
            margin-top: 5px;
        }

        /* Tables & Forms */
        .card {
            background: var(--pure-white);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 25px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--gold-light);
        }

        .card-header h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--pure-black);
        }

        .btn-add {
            background: var(--pure-black);
            color: var(--gold);
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add:hover {
            background: var(--gold);
            color: var(--pure-black);
        }

        .btn-edit {
            background: var(--gold-soft);
            color: var(--gold-dark);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            margin-right: 8px;
        }

        .btn-delete {
            background: #fee2e2;
            color: #dc2626;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
        }

        .btn-save {
            background: var(--pure-black);
            color: var(--gold);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-save:hover {
            background: var(--gold);
            color: var(--pure-black);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--pure-black);
            font-weight: 700;
            background: var(--soft-gray);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending { background: #fef3c7; color: #92400e; }
        .status-processing { background: #dbeafe; color: #1e40af; }
        .status-shipped { background: #dcfce7; color: #166534; }
        .status-completed { background: #e0e7ff; color: #3730a3; }

        select, input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        label {
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
            color: var(--pure-black);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--pure-white);
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: var(--pure-black);
        }

        .modal-body {
            padding: 20px;
        }

        .close-modal {
            font-size: 24px;
            cursor: pointer;
            color: var(--medium-gray);
        }

        .image-preview {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 200;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 15px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .menu-toggle {
                display: block;
                position: fixed;
                top: 15px;
                left: 15px;
                z-index: 201;
                background: var(--pure-black);
                color: var(--gold);
                border: none;
                padding: 10px;
                border-radius: 10px;
                cursor: pointer;
            }
        }

        @media (min-width: 769px) {
            .menu-toggle {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-store"></i> BabaAfzaal</h2>
                <p>Admin Panel</p>
            </div>
            <div class="sidebar-menu">
                <div class="menu-item active" data-page="dashboard">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </div>
                <div class="menu-item" data-page="products">
                    <i class="fas fa-box"></i> Produk
                </div>
                <div class="menu-item" data-page="orders">
                    <i class="fas fa-shopping-cart"></i> Pesanan
                </div>
                <div class="menu-item" data-page="carousel">
                    <i class="fas fa-images"></i> Carousel
                </div>
                <div class="menu-item" data-page="settings">
                    <i class="fas fa-cog"></i> Pengaturan
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div class="top-bar">
                <h1 class="page-title" id="pageTitle"><i class="fas fa-tachometer-alt"></i> Dashboard</h1>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>

            <div id="pageContent">
                <!-- Content will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Modal for Add/Edit -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Tambah Produk</h3>
                <span class="close-modal" onclick="closeProductModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="productId">
                <label>Nama Produk</label>
                <input type="text" id="productName" placeholder="Nama produk">
                <label>Deskripsi</label>
                <textarea id="productDesc" rows="3" placeholder="Deskripsi produk"></textarea>
                <label>Harga (Rp)</label>
                <input type="number" id="productPrice" placeholder="Harga">
                <label>Kategori</label>
                <select id="productCategory">
                    <option value="Makanan">Makanan</option>
                    <option value="Minuman">Minuman</option>
                    <option value="Kesehatan">Kesehatan</option>
                </select>
                <label>Icon (Font Awesome)</label>
                <input type="text" id="productIcon" placeholder="contoh: fas fa-coffee">
                <label>Stok</label>
                <input type="number" id="productStock" placeholder="Stok">
                <button class="btn-save" style="width:100%" onclick="saveProduct()">Simpan Produk</button>
            </div>
        </div>
    </div>

    <!-- Modal for Carousel -->
    <div class="modal" id="carouselModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="carouselModalTitle">Tambah Slide</h3>
                <span class="close-modal" onclick="closeCarouselModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="carouselId">
                <label>Judul Slide</label>
                <input type="text" id="carouselTitle" placeholder="Judul slide">
                <label>Deskripsi</label>
                <textarea id="carouselDesc" rows="2" placeholder="Deskripsi slide"></textarea>
                <label>Warna Background (opsional)</label>
                <input type="color" id="carouselBg" value="#1a1a1a">
                <button class="btn-save" style="width:100%" onclick="saveCarousel()">Simpan Slide</button>
            </div>
        </div>
    </div>

    <script>
        // Data
        let products = [];
        let orders = [];
        let carouselSlides = [];
        let settings = {};

        // Load initial data
        function loadData() {
            products = JSON.parse(localStorage.getItem('babaafzaal_products') || '[]');
            orders = JSON.parse(localStorage.getItem('babaafzaal_orders') || '[]');
            carouselSlides = JSON.parse(localStorage.getItem('babaafzaal_carousel') || '[]');
            settings = JSON.parse(localStorage.getItem('babaafzaal_settings') || '{}');
            
            if(products.length === 0) {
                products = [
                    { id:1, name:"Kopi Arabika Premium", description:"Kopi arabika pilihan dengan rasa yang kaya", price:85000, category:"Minuman", icon:"fas fa-mug-hot", stock:50, views:245, sold:120, rating:210, ratingCount:42 },
                    { id:2, name:"Madu Asli Hutan", description:"Madu murni dari lebah hutan", price:125000, category:"Makanan", icon:"fas fa-honey-pot", stock:30, views:189, sold:85, rating:220, ratingCount:38 },
                    { id:3, name:"Minyak Zaitun Extra Virgin", description:"Minyak zaitun premium", price:185000, category:"Makanan", icon:"fas fa-oil-can", stock:25, views:156, sold:45, rating:210, ratingCount:29 }
                ];
                localStorage.setItem('babaafzaal_products', JSON.stringify(products));
            }
            
            if(carouselSlides.length === 0) {
                carouselSlides = [
                    { id:1, title:"Selamat Datang di Warung BabaAfzaal", description:"Belanja praktis, aman & terpercaya", bgColor:"#1a1a1a" },
                    { id:2, title:"Promo Spesial", description:"Dapatkan diskon menarik", bgColor:"#2d2d2d" }
                ];
                localStorage.setItem('babaafzaal_carousel', JSON.stringify(carouselSlides));
            }
        }

        // Render Dashboard
        function renderDashboard() {
            const totalProducts = products.length;
            const totalOrders = orders.length;
            const totalRevenue = orders.reduce((sum, o) => sum + o.total, 0);
            const pendingOrders = orders.filter(o => o.status === 'pending').length;
            
            document.getElementById('pageContent').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-box"></i></div>
                        <div class="stat-value">${totalProducts}</div>
                        <div class="stat-label">Total Produk</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-shopping-cart"></i></div>
                        <div class="stat-value">${totalOrders}</div>
                        <div class="stat-label">Total Pesanan</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-hourglass-half"></i></div>
                        <div class="stat-value">${pendingOrders}</div>
                        <div class="stat-label">Pending</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                        <div class="stat-value">Rp ${totalRevenue.toLocaleString('id-ID')}</div>
                        <div class="stat-label">Total Pendapatan</div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><h3><i class="fas fa-clock"></i> Pesanan Terbaru</h3></div>
                    <table style="width:100%">
                        <thead><tr><th>ID Pesanan</th><th>Pelanggan</th><th>Total</th><th>Status</th><th>Aksi</th></tr></thead>
                        <tbody id="latestOrders"></tbody>
                    </table>
                </div>
            `;
            
            const latestOrders = [...orders].reverse().slice(0,5);
            const tbody = document.getElementById('latestOrders');
            if(latestOrders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">Belum ada pesanan</td></tr>';
            } else {
                tbody.innerHTML = latestOrders.map(o => `
                    <tr>
                        <td>${o.id}</td>
                        <td>${o.customerName}</td>
                        <td>Rp ${o.total.toLocaleString('id-ID')}</td>
                        <td><span class="status-badge status-${o.status === 'pending' ? 'pending' : o.status}">${o.status === 'pending' ? 'Menunggu' : o.status}</span></td>
                        <td><button class="btn-edit" onclick="goToOrders()">Detail</button></td>
                    </tr>
                `).join('');
            }
        }

        // Render Products
        function renderProducts() {
            document.getElementById('pageContent').innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-box"></i> Daftar Produk</h3>
                        <button class="btn-add" onclick="openProductModal()"><i class="fas fa-plus"></i> Tambah Produk</button>
                    </div>
                    <div style="overflow-x:auto">
                        <table style="width:100%">
                            <thead><tr><th>Icon</th><th>Nama</th><th>Kategori</th><th>Harga</th><th>Stok</th><th>Terjual</th><th>Aksi</th></tr></thead>
                            <tbody id="productsTable"></tbody>
                        </table>
                    </div>
                </div>
            `;
            
            const tbody = document.getElementById('productsTable');
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td><i class="${p.icon}" style="font-size:20px; color:var(--gold)"></i></td>
                    <td>${p.name}</td>
                    <td>${p.category}</td>
                    <td>Rp ${p.price.toLocaleString('id-ID')}</td>
                    <td>${p.stock}</td>
                    <td>${p.sold || 0}</td>
                    <td>
                        <button class="btn-edit" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn-delete" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i> Hapus</button>
                    </td>
                </tr>
            `).join('');
        }

        // Render Orders
        function renderOrders() {
            document.getElementById('pageContent').innerHTML = `
                <div class="card">
                    <div class="card-header"><h3><i class="fas fa-shopping-cart"></i> Semua Pesanan</h3></div>
                    <div style="overflow-x:auto">
                        <table style="width:100%">
                            <thead><tr><th>ID Pesanan</th><th>Pelanggan</th><th>Tanggal</th><th>Total</th><th>Status</th><th>Aksi</th></tr></thead>
                            <tbody id="ordersTable"></tbody>
                        </table>
                    </div>
                </div>
            `;
            
            const tbody = document.getElementById('ordersTable');
            if(orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">Belum ada pesanan</td></tr>';
            } else {
                tbody.innerHTML = orders.map(o => `
                    <tr>
                        <td>${o.id}</td>
                        <td>${o.customerName}<br><small>${o.customerPhone}</small></td>
                        <td>${o.date}</td>
                        <td>Rp ${o.total.toLocaleString('id-ID')}</td>
                        <td>
                            <select onchange="updateOrderStatus('${o.id}', this.value)" style="width:120px; margin-bottom:0">
                                <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>Menunggu</option>
                                <option value="processing" ${o.status === 'processing' ? 'selected' : ''}>Diproses</option>
                                <option value="shipped" ${o.status === 'shipped' ? 'selected' : ''}>Dikirim</option>
                                <option value="completed" ${o.status === 'completed' ? 'selected' : ''}>Selesai</option>
                            </select>
                        </td>
                        <td><button class="btn-edit" onclick="viewOrderDetail('${o.id}')">Detail</button></td>
                    </tr>
                `).join('');
            }
        }

        // Render Carousel
        function renderCarousel() {
            document.getElementById('pageContent').innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-images"></i> Manajemen Carousel</h3>
                        <button class="btn-add" onclick="openCarouselModal()"><i class="fas fa-plus"></i> Tambah Slide</button>
                    </div>
                    <div style="overflow-x:auto">
                        <table style="width:100%">
                            <thead><tr><th>Judul</th><th>Deskripsi</th><th>Warna</th><th>Aksi</th></tr></thead>
                            <tbody id="carouselTable"></tbody>
                        </table>
                    </div>
                </div>
            `;
            
            const tbody = document.getElementById('carouselTable');
            if(carouselSlides.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">Belum ada slide</td></tr>';
            } else {
                tbody.innerHTML = carouselSlides.map(s => `
                    <tr>
                        <td>${s.title}</td>
                        <td>${s.description}</td>
                        <td><div style="width:30px; height:30px; background:${s.bgColor}; border-radius:8px; border:1px solid #ddd"></div></td>
                        <td>
                            <button class="btn-edit" onclick="editCarousel(${s.id})"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn-delete" onclick="deleteCarousel(${s.id})"><i class="fas fa-trash"></i> Hapus</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        // Render Settings
        function renderSettings() {
            const whatsapp = JSON.parse(localStorage.getItem('babaafzaal_whatsapp') || '{"number":"6281234567890"}');
            document.getElementById('pageContent').innerHTML = `
                <div class="card">
                    <div class="card-header"><h3><i class="fas fa-cog"></i> Pengaturan Toko</h3></div>
                    <div style="max-width:500px">
                        <label>Nama Toko</label>
                        <input type="text" id="storeName" value="Warung BabaAfzaal">
                        <label>Nomor WhatsApp Admin</label>
                        <input type="tel" id="whatsappNumber" value="${whatsapp.number}">
                        <label>Alamat Toko</label>
                        <textarea id="storeAddress" rows="2">Jl. Contoh No. 123, Kota, Indonesia</textarea>
                        <button class="btn-save" onclick="saveSettings()">Simpan Pengaturan</button>
                    </div>
                </div>
            `;
        }

        // CRUD Products
        function openProductModal(editId = null) {
            if(editId) {
                const p = products.find(p => p.id === editId);
                if(p) {
                    document.getElementById('modalTitle').innerText = 'Edit Produk';
                    document.getElementById('productId').value = p.id;
                    document.getElementById('productName').value = p.name;
                    document.getElementById('productDesc').value = p.description;
                    document.getElementById('productPrice').value = p.price;
                    document.getElementById('productCategory').value = p.category;
                    document.getElementById('productIcon').value = p.icon;
                    document.getElementById('productStock').value = p.stock;
                }
            } else {
                document.getElementById('modalTitle').innerText = 'Tambah Produk';
                document.getElementById('productId').value = '';
                document.getElementById('productName').value = '';
                document.getElementById('productDesc').value = '';
                document.getElementById('productPrice').value = '';
                document.getElementById('productCategory').value = 'Makanan';
                document.getElementById('productIcon').value = 'fas fa-box';
                document.getElementById('productStock').value = '';
            }
            document.getElementById('productModal').style.display = 'flex';
        }

        function closeProductModal() {
            document.getElementById('productModal').style.display = 'none';
        }

        function saveProduct() {
            const id = document.getElementById('productId').value;
            const product = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('productName').value,
                description: document.getElementById('productDesc').value,
                price: parseInt(document.getElementById('productPrice').value),
                category: document.getElementById('productCategory').value,
                icon: document.getElementById('productIcon').value,
                stock: parseInt(document.getElementById('productStock').value),
                views: 0,
                sold: 0,
                rating: 0,
                ratingCount: 0
            };
            
            if(id) {
                const index = products.findIndex(p => p.id === parseInt(id));
                if(index !== -1) products[index] = { ...products[index], ...product };
            } else {
                products.push(product);
            }
            
            localStorage.setItem('babaafzaal_products', JSON.stringify(products));
            closeProductModal();
            renderProducts();
            showNotification('Produk berhasil disimpan');
        }

        function editProduct(id) {
            openProductModal(id);
        }

        function deleteProduct(id) {
            if(confirm('Yakin ingin menghapus produk ini?')) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('babaafzaal_products', JSON.stringify(products));
                renderProducts();
                showNotification('Produk dihapus');
            }
        }

        // Update Order Status
        function updateOrderStatus(orderId, status) {
            const order = orders.find(o => o.id === orderId);
            if(order) {
                order.status = status;
                localStorage.setItem('babaafzaal_orders', JSON.stringify(orders));
                showNotification('Status pesanan diupdate');
                renderOrders();
            }
        }

        function viewOrderDetail(orderId) {
            const order = orders.find(o => o.id === orderId);
            if(order) {
                let itemsHtml = '';
                order.items.forEach(item => {
                    itemsHtml += `<div>${item.quantity}x ${item.name} - Rp ${(item.price * item.quantity).toLocaleString('id-ID')}</div>`;
                });
                alert(`ID: ${order.id}\nPelanggan: ${order.customerName}\nTelepon: ${order.customerPhone}\nAlamat: ${order.customerAddress}\n\nProduk:\n${itemsHtml}\nTotal: Rp ${order.total.toLocaleString('id-ID')}`);
            }
        }

        // CRUD Carousel
        function openCarouselModal(editId = null) {
            if(editId) {
                const s = carouselSlides.find(s => s.id === editId);
                if(s) {
                    document.getElementById('carouselModalTitle').innerText = 'Edit Slide';
                    document.getElementById('carouselId').value = s.id;
                    document.getElementById('carouselTitle').value = s.title;
                    document.getElementById('carouselDesc').value = s.description;
                    document.getElementById('carouselBg').value = s.bgColor || '#1a1a1a';
                }
            } else {
                document.getElementById('carouselModalTitle').innerText = 'Tambah Slide';
                document.getElementById('carouselId').value = '';
                document.getElementById('carouselTitle').value = '';
                document.getElementById('carouselDesc').value = '';
                document.getElementById('carouselBg').value = '#1a1a1a';
            }
            document.getElementById('carouselModal').style.display = 'flex';
        }

        function closeCarouselModal() {
            document.getElementById('carouselModal').style.display = 'none';
        }

        function saveCarousel() {
            const id = document.getElementById('carouselId').value;
            const slide = {
                id: id ? parseInt(id) : Date.now(),
                title: document.getElementById('carouselTitle').value,
                description: document.getElementById('carouselDesc').value,
                bgColor: document.getElementById('carouselBg').value
            };
            
            if(id) {
                const index = carouselSlides.findIndex(s => s.id === parseInt(id));
                if(index !== -1) carouselSlides[index] = slide;
            } else {
                carouselSlides.push(slide);
            }
            
            localStorage.setItem('babaafzaal_carousel', JSON.stringify(carouselSlides));
            closeCarouselModal();
            renderCarousel();
            showNotification('Slide carousel disimpan');
        }

        function editCarousel(id) {
            openCarouselModal(id);
        }

        function deleteCarousel(id) {
            if(confirm('Yakin ingin menghapus slide ini?')) {
                carouselSlides = carouselSlides.filter(s => s.id !== id);
                localStorage.setItem('babaafzaal_carousel', JSON.stringify(carouselSlides));
                renderCarousel();
                showNotification('Slide dihapus');
            }
        }

        // Settings
        function saveSettings() {
            const whatsappNumber = document.getElementById('whatsappNumber').value;
            localStorage.setItem('babaafzaal_whatsapp', JSON.stringify({ number: whatsappNumber }));
            showNotification('Pengaturan disimpan');
        }

        // Navigation
        let currentPage = 'dashboard';
        
        function navigateTo(page) {
            currentPage = page;
            document.querySelectorAll('.menu-item').forEach(item => {
                if(item.getAttribute('data-page') === page) item.classList.add('active');
                else item.classList.remove('active');
            });
            
            const titles = {
                dashboard: 'Dashboard',
                products: 'Manajemen Produk',
                orders: 'Manajemen Pesanan',
                carousel: 'Manajemen Carousel',
                settings: 'Pengaturan Toko'
            };
            document.getElementById('pageTitle').innerHTML = `<i class="fas fa-${page === 'dashboard' ? 'tachometer-alt' : page === 'products' ? 'box' : page === 'orders' ? 'shopping-cart' : page === 'carousel' ? 'images' : 'cog'}"></i> ${titles[page]}`;
            
            if(page === 'dashboard') renderDashboard();
            else if(page === 'products') renderProducts();
            else if(page === 'orders') renderOrders();
            else if(page === 'carousel') renderCarousel();
            else if(page === 'settings') renderSettings();
        }

        function goToOrders() {
            navigateTo('orders');
        }

        function logout() {
            if(confirm('Yakin ingin logout?')) {
                window.location.href = 'index.html';
            }
        }

        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.style.cssText = 'position:fixed; bottom:20px; right:20px; background:var(--pure-black); color:var(--gold); padding:12px 24px; border-radius:30px; z-index:1000; font-size:14px; box-shadow:0 4px 15px rgba(0,0,0,0.2);';
            notif.innerText = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // Sidebar Toggle Mobile
        document.getElementById('menuToggle')?.addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => {
                const page = item.getAttribute('data-page');
                navigateTo(page);
                if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
            });
        });

        // Initialize
        loadData();
        navigateTo('dashboard');
        
        window.onclick = function(event) {
            if(event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
