<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Warung BabaAfzaal - Jajan Online</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">
    <style>
        /* Reset & Base - Warna Baru: Putih, Biru Tosca, Gold, Hitam */
        :root {
            --pure-white: #ffffff;
            --off-white: #f8f9fa;
            --deep-black: #0a0a0a;
            --pure-black: #000000;
            --teal: #008080;      /* Biru Tosca */
            --teal-light: #20b2aa;
            --teal-dark: #006666;
            --gold: #ffd700;
            --gold-dark: #daa520;
            --gold-light: #fff8dc;
            --charcoal: #1a1a1a;
            --dark-gray: #2c2c2c;
            --medium-gray: #3d3d3d;
            --light-gray: #e9ecef;
            --border-color: #dee2e6;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 5px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.12);
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }
        
        body {
            background-color: var(--pure-white);
            color: var(--pure-black);
            line-height: 1.5;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Header */
        header {
            background: var(--pure-black);
            color: var(--pure-white);
            padding: 14px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-md);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo i {
            font-size: 26px;
            color: var(--gold);
        }
        
        .logo h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        
        .logo span {
            color: var(--teal-light);
            font-weight: 500;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .cart-icon {
            position: relative;
            font-size: 20px;
            cursor: pointer;
            transition: var(--transition);
            padding: 8px;
            border-radius: 50%;
            background: var(--charcoal);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .cart-icon:hover {
            background: var(--teal);
            transform: scale(1.02);
        }
        
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--gold);
            color: var(--pure-black);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
            border: 2px solid var(--pure-black);
        }
        
        .check-order-btn {
            background: var(--teal);
            color: var(--pure-white);
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .check-order-btn:hover {
            background: var(--teal-dark);
            transform: translateY(-2px);
        }
        
        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--pure-white);
            font-size: 22px;
            cursor: pointer;
        }
        
        /* Carousel */
        .carousel-section {
            background: var(--deep-black);
            margin-bottom: 50px;
            position: relative;
            overflow: hidden;
        }
        
        .swiper {
            width: 100%;
            height: 450px;
        }
        
        .swiper-slide {
            background: var(--charcoal);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .carousel-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.6;
        }
        
        .carousel-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: var(--pure-white);
            padding: 0 20px;
            max-width: 700px;
        }
        
        .carousel-title {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, var(--gold), var(--teal-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .carousel-description {
            font-size: 18px;
            margin-bottom: 25px;
            color: var(--off-white);
        }
        
        .swiper-button-next, .swiper-button-prev {
            color: var(--gold) !important;
            background: rgba(0,0,0,0.4);
            width: 44px !important;
            height: 44px !important;
            border-radius: 50%;
        }
        
        .swiper-pagination-bullet-active {
            background: var(--gold) !important;
        }
        
        /* Products Section */
        .products-section {
            padding: 50px 0 80px;
            background: var(--pure-white);
        }
        
        .section-title {
            text-align: center;
            font-size: 32px;
            margin-bottom: 40px;
            color: var(--pure-black);
            font-weight: 800;
            position: relative;
        }
        
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, var(--teal), var(--gold));
            border-radius: 3px;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }
        
        /* ========== PRODUCT CARD REVISED - 2 BAGIAN DI MOBILE ========== */
        .product-card {
            background: var(--pure-white);
            border-radius: 16px;
            overflow: hidden;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: var(--teal);
        }
        
        /* BAGIAN 1: Gambar / Icon + Badge */
        .product-media {
            position: relative;
            background: linear-gradient(135deg, var(--off-white), #fff);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            border-bottom: 2px solid var(--gold-light);
        }
        
        .product-image {
            width: 100%;
            height: 180px;
            object-fit: contain;
            transition: transform 0.4s ease;
        }
        
        .product-icon {
            font-size: 80px;
            color: var(--teal);
            transition: transform 0.3s;
        }
        
        .product-card:hover .product-icon {
            transform: scale(1.05);
            color: var(--gold-dark);
        }
        
        .product-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--gold);
            color: var(--pure-black);
            padding: 5px 12px;
            font-size: 11px;
            font-weight: 800;
            border-radius: 20px;
            z-index: 2;
            box-shadow: var(--shadow-sm);
        }
        
        /* BAGIAN 2: Informasi Produk + Tombol */
        .product-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
            background: var(--pure-white);
        }
        
        .product-category {
            font-size: 11px;
            color: var(--teal);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        
        .product-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--pure-black);
            line-height: 1.3;
        }
        
        .product-description {
            font-size: 13px;
            color: var(--medium-gray);
            margin-bottom: 12px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .product-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--teal-dark);
            margin-bottom: 12px;
            font-weight: 500;
        }
        
        .product-rating i {
            color: var(--gold);
            margin-right: 4px;
        }
        
        .product-price {
            font-size: 22px;
            font-weight: 800;
            color: var(--teal);
            margin-bottom: 16px;
        }
        
        .product-price span {
            font-size: 13px;
            font-weight: normal;
            color: var(--medium-gray);
        }
        
        .btn-detail {
            background: var(--pure-black);
            color: var(--pure-white);
            border: none;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            border-radius: 40px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-detail:hover {
            background: var(--teal);
            color: var(--pure-white);
            transform: scale(1.02);
        }
        
        /* ========== RESPONSIVE MOBILE: 2 CARD PER BARIS ========== */
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 14px;
            }
            
            .product-media {
                min-height: 150px;
                padding: 12px;
            }
            
            .product-image {
                height: 120px;
            }
            
            .product-icon {
                font-size: 55px;
            }
            
            .product-info {
                padding: 14px;
            }
            
            .product-title {
                font-size: 15px;
                margin-bottom: 5px;
            }
            
            .product-description {
                font-size: 11px;
                margin-bottom: 8px;
                -webkit-line-clamp: 2;
            }
            
            .product-price {
                font-size: 16px;
                margin-bottom: 10px;
            }
            
            .btn-detail {
                padding: 8px;
                font-size: 12px;
            }
            
            .product-meta {
                font-size: 10px;
                margin-bottom: 8px;
            }
            
            .product-badge {
                font-size: 9px;
                padding: 3px 8px;
                top: 8px;
                left: 8px;
            }
            
            .section-title {
                font-size: 24px;
            }
            
            .carousel-title {
                font-size: 28px;
            }
            
            .carousel-description {
                font-size: 14px;
            }
            
            .swiper {
                height: 320px;
            }
        }
        
        @media (max-width: 480px) {
            .products-grid {
                gap: 10px;
            }
            
            .product-title {
                font-size: 13px;
            }
            
            .product-price {
                font-size: 14px;
            }
            
            .btn-detail {
                font-size: 10px;
                padding: 6px;
            }
            
            .product-media {
                min-height: 130px;
            }
            
            .product-icon {
                font-size: 45px;
            }
        }
        
        /* Status Section */
        .status-section {
            background: linear-gradient(135deg, var(--teal-light), var(--teal-dark));
            padding: 50px 0;
            margin-bottom: 50px;
        }
        
        .status-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--pure-white);
        }
        
        .status-description {
            color: var(--gold-light);
            margin-bottom: 30px;
        }
        
        .status-form {
            display: flex;
            gap: 10px;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .status-input {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-size: 14px;
        }
        
        .status-btn {
            background: var(--gold);
            color: var(--pure-black);
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .status-btn:hover {
            background: var(--gold-dark);
            transform: translateY(-2px);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            overflow-y: auto;
        }
        
        .modal-content {
            background: var(--pure-white);
            margin: 40px auto;
            width: 90%;
            max-width: 900px;
            border-radius: 24px;
            overflow: hidden;
            animation: modalFadeIn 0.3s ease;
        }
        
        .modal-header {
            background: var(--pure-black);
            color: var(--gold);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .close-modal {
            font-size: 28px;
            cursor: pointer;
            transition: var(--transition);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        
        /* Footer */
        footer {
            background: var(--pure-black);
            color: var(--pure-white);
            padding: 50px 0 30px;
            border-top: 3px solid var(--gold);
        }
        
        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .footer-section h3 {
            color: var(--gold);
            margin-bottom: 20px;
            font-size: 18px;
        }
        
        .social-links {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        
        .social-links a {
            background: var(--teal);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: 0.3s;
        }
        
        .social-links a:hover {
            background: var(--gold);
            color: black;
            transform: translateY(-3px);
        }
        
        .floating-whatsapp {
            position: fixed;
            bottom: 25px;
            left: 25px;
            width: 55px;
            height: 55px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 999;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--pure-black);
            color: var(--gold);
            padding: 14px 20px;
            border-radius: 12px;
            display: none;
            z-index: 3000;
            border-left: 5px solid var(--gold);
        }
        
        /* Utility */
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .payment-option.selected {
            border-color: var(--gold);
            background: var(--gold-light);
        }
        
        .btn-checkout {
            background: var(--teal);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 800;
        }
        
        .btn-checkout:hover {
            background: var(--teal-dark);
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo">
                <i class="fas fa-crown"></i>
                <h1><span>Warung</span> BabaAfzaal</h1>
            </div>
            <div class="header-actions">
                <button class="check-order-btn" onclick="openOrderStatus()"><i class="fas fa-search"></i> Cek Status</button>
                <div class="cart-icon" onclick="openCheckoutModal()">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </div>
        </div>
    </header>

    <section class="carousel-section">
        <div class="swiper">
            <div class="swiper-wrapper" id="carouselWrapper"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-pagination"></div>
        </div>
    </section>

    <section class="status-section">
        <div class="container status-container" style="text-align:center">
            <h2 class="status-title">CEK STATUS PESANAN</h2>
            <p class="status-description">Masukkan ID pesanan untuk lacak pesananmu</p>
            <div class="status-form">
                <input type="text" id="orderIdInput" placeholder="ORD-xxxxxx">
                <button class="status-btn" onclick="checkOrderStatus()"><i class="fas fa-search"></i> Cek</button>
            </div>
            <div id="orderResult" style="margin-top:20px; display:none;"></div>
        </div>
    </section>

    <section class="products-section">
        <div class="container">
            <h2 class="section-title">✨ PRODUK PILIHAN ✨</h2>
            <div class="products-grid" id="productsGrid"></div>
        </div>
    </section>

    <!-- Modals -->
    <div class="modal" id="productDetailModal"><div class="modal-content"><div class="modal-header"><h2>Detail Produk</h2><span class="close-modal" onclick="closeProductDetailModal()">&times;</span></div><div class="modal-body" id="productDetailContent"></div></div></div>
    <div class="modal" id="checkoutModal"><div class="modal-content"><div class="modal-header"><h2>Keranjang Belanja</h2><span class="close-modal" onclick="closeCheckoutModal()">&times;</span></div><div class="modal-body" id="checkoutContent"></div></div></div>
    <div class="modal" id="orderConfirmationModal"><div class="modal-content"><div class="modal-header"><h2>Pesanan Berhasil</h2><span class="close-modal" onclick="closeOrderConfirmationModal()">&times;</span></div><div class="modal-body" id="orderConfirmationContent"></div></div></div>

    <footer id="mainFooter">
        <div class="container">
            <div class="footer-content" id="footerContent"></div>
            <div class="footer-bottom" style="text-align:center; color:#aaa"><p id="footerCopyright"></p></div>
        </div>
    </footer>

    <div class="floating-whatsapp" onclick="openWhatsAppChat()"><i class="fab fa-whatsapp"></i></div>
    <div class="notification" id="notification"></div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper', {
            loop: true, autoplay: { delay: 4000 }, pagination: { el: '.swiper-pagination', clickable: true },
            navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' }
        });

        let products = [], cart = [], carouselSlides = [], footerData = {};
        let whatsappNumber = "6281234567890";

        function loadCarousel() {
            carouselSlides = JSON.parse(localStorage.getItem('babaafzaal_carousel')) || [
                { title: "Selamat Datang di Warung BabaAfzaal", description: "Belanja praktis, aman & terpercaya", image: "", bgColor: "#0a0a0a" },
                { title: "Diskon Spesial Akhir Tahun", description: "Dapatkan harga terbaik untuk produk favorit", image: "", bgColor: "#006666" },
                { title: "Gratis Ongkir", description: "Minimal belanja Rp 150.000", image: "", bgColor: "#daa520" }
            ];
            renderCarousel();
        }
        function renderCarousel() {
            let html = '';
            carouselSlides.forEach(s => { html += `<div class="swiper-slide" style="background:${s.bgColor || '#000'}"><div class="carousel-content"><h2 class="carousel-title">${s.title}</h2><p class="carousel-description">${s.description}</p></div></div>`; });
            document.getElementById('carouselWrapper').innerHTML = html;
            swiper.update();
        }

        function loadProducts() {
            let saved = localStorage.getItem('babaafzaal_products');
            if(saved) products = JSON.parse(saved);
            else {
                products = [
                    { id:1, name:"Kopi Arabika Premium", description:"Kopi arabika dengan aroma khas dan rasa smooth.", price:85000, category:"Minuman", stock:50, sold:120, rating:4.8, icon:"fas fa-mug-hot", image:"" },
                    { id:2, name:"Madu Asli Hutan", description:"Madu murni tanpa campuran, kaya manfaat.", price:125000, category:"Makanan", stock:30, sold:85, rating:4.9, icon:"fas fa-honey-pot", image:"" },
                    { id:3, name:"Minyak Zaitun Extra Virgin", description:"Minyak zaitun premium untuk kesehatan.", price:185000, category:"Makanan", stock:25, sold:45, rating:4.7, icon:"fas fa-oil-can", image:"" },
                    { id:4, name:"Teh Herbal Jasmine", description:"Teh bunga melati menenangkan.", price:65000, category:"Minuman", stock:75, sold:95, rating:4.6, icon:"fas fa-leaf", image:"" },
                    { id:5, name:"Kurma Medjool", description:"Kurma terbaik dengan tekstur lembut.", price:95000, category:"Makanan", stock:100, sold:210, rating:4.9, icon:"fas fa-apple-alt", image:"" },
                    { id:6, name:"VCO Minyak Kelapa", description:"Minyak kelapa murni cold pressed.", price:75000, category:"Kesehatan", stock:40, sold:65, rating:4.8, icon:"fas fa-seedling", image:"" }
                ];
                localStorage.setItem('babaafzaal_products', JSON.stringify(products));
            }
            displayProducts();
        }
        
        function displayProducts() {
            let grid = document.getElementById('productsGrid');
            if(!products.length) { grid.innerHTML = '<div class="empty-state">Tidak ada produk</div>'; return; }
            let html = '';
            products.forEach(p => {
                html += `
                    <div class="product-card">
                        <div class="product-media">
                            ${p.image ? `<img src="${p.image}" class="product-image" alt="${p.name}">` : `<i class="${p.icon} product-icon"></i>`}
                            ${p.stock < 5 ? '<div class="product-badge">TERBATAS</div>' : ''}
                        </div>
                        <div class="product-info">
                            <div class="product-category">${p.category}</div>
                            <div class="product-title">${p.name}</div>
                            <p class="product-description">${p.description.substring(0, 70)}...</p>
                            <div class="product-meta"><span><i class="fas fa-star" style="color:var(--gold)"></i> ${p.rating}</span><span>Terjual ${p.sold}</span><span>Stok ${p.stock}</span></div>
                            <div class="product-price">Rp ${p.price.toLocaleString('id-ID')}</div>
                            <button class="btn-detail" onclick="showProductDetail(${p.id})"><i class="fas fa-eye"></i> Lihat Detail</button>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        function showProductDetail(id) {
            let p = products.find(x => x.id === id);
            let detailHTML = `<div style="padding:20px"><h2>${p.name}</h2><p>${p.description}</p><div class="product-price">Rp ${p.price.toLocaleString('id-ID')}</div><button class="btn-detail" onclick="addToCart(${p.id})">Tambah ke Keranjang</button></div>`;
            document.getElementById('productDetailContent').innerHTML = detailHTML;
            document.getElementById('productDetailModal').style.display = 'block';
        }
        
        function addToCart(pid) {
            let product = products.find(p => p.id === pid);
            let existing = cart.find(i => i.productId === pid);
            if(existing) existing.quantity++;
            else cart.push({ productId:pid, name:product.name, price:product.price, quantity:1, icon:product.icon });
            saveCart();
            showNotification(`${product.name} ditambahkan ke keranjang`, 'success');
            closeProductDetailModal();
        }
        
        function saveCart() { localStorage.setItem('babaafzaal_cart', JSON.stringify(cart)); updateCartCount(); }
        function updateCartCount() { document.getElementById('cartCount').innerText = cart.reduce((s,i)=>s+i.quantity,0); }
        
        function openCheckoutModal() {
            if(!cart.length) { showNotification('Keranjang kosong','error'); return; }
            let subtotal = cart.reduce((s,i)=>s + (i.price * i.quantity),0);
            let total = subtotal + 10000;
            let itemsHtml = cart.map(i => `<div style="display:flex;justify-content:space-between;border-bottom:1px solid #ddd;padding:8px">${i.quantity}x ${i.name} <span>Rp ${(i.price*i.quantity).toLocaleString('id-ID')}</span></div>`).join('');
            document.getElementById('checkoutContent').innerHTML = `
                <div style="padding:20px">
                    <h3>Produk</h3>${itemsHtml}
                    <div>Subtotal: Rp ${subtotal.toLocaleString('id-ID')}</div>
                    <div>Ongkir: Rp 10.000</div>
                    <div class="product-price">Total: Rp ${total.toLocaleString('id-ID')}</div>
                    <input type="text" id="custName" placeholder="Nama Lengkap" style="width:100%;margin:10px 0;padding:12px;border:1px solid #ccc;border-radius:40px">
                    <input type="text" id="custPhone" placeholder="No WhatsApp" style="width:100%;margin:10px 0;padding:12px;border:1px solid #ccc;border-radius:40px">
                    <textarea id="custAddress" placeholder="Alamat Lengkap" rows="2" style="width:100%;margin:10px 0;padding:12px;border-radius:20px"></textarea>
                    <button class="btn-checkout" onclick="processCheckout()">BUAT PESANAN</button>
                </div>
            `;
            document.getElementById('checkoutModal').style.display = 'block';
        }
        
        function processCheckout() {
            let name = document.getElementById('custName')?.value.trim();
            let phone = document.getElementById('custPhone')?.value.trim();
            let address = document.getElementById('custAddress')?.value.trim();
            if(!name || !phone || !address) { showNotification('Lengkapi data','error'); return; }
            let subtotal = cart.reduce((s,i)=>s + (i.price * i.quantity),0);
            let total = subtotal + 10000;
            let orderId = 'ORD-' + Date.now().toString().slice(-8);
            let order = { id:orderId, date:new Date().toLocaleString(), customerName:name, customerPhone:phone, customerAddress:address, items:[...cart], total:total, status:'pending' };
            let orders = JSON.parse(localStorage.getItem('babaafzaal_orders')||'[]');
            orders.push(order);
            localStorage.setItem('babaafzaal_orders', JSON.stringify(orders));
            cart = []; saveCart();
            closeCheckoutModal();
            document.getElementById('orderConfirmationContent').innerHTML = `<div class="order-confirmation" style="padding:30px;text-align:center"><i class="fas fa-check-circle" style="font-size:70px;color:var(--gold)"></i><h2>Pesanan Berhasil!</h2><p>ID: ${orderId}</p><button class="btn-detail" onclick="closeOrderConfirmationModal()">Tutup</button></div>`;
            document.getElementById('orderConfirmationModal').style.display = 'block';
        }
        
        function checkOrderStatus() {
            let id = document.getElementById('orderIdInput').value.trim();
            let orders = JSON.parse(localStorage.getItem('babaafzaal_orders')||'[]');
            let order = orders.find(o=>o.id===id);
            let resultDiv = document.getElementById('orderResult');
            if(!order) { resultDiv.innerHTML = '<div style="background:white;padding:20px;border-radius:20px">Pesanan tidak ditemukan</div>'; resultDiv.style.display='block'; return; }
            resultDiv.innerHTML = `<div style="background:white;padding:20px;border-radius:20px"><strong>${order.id}</strong> - Status: ${order.status}<br>Nama: ${order.customerName}<br>Total: Rp ${order.total.toLocaleString('id-ID')}</div>`;
            resultDiv.style.display='block';
        }
        
        function closeProductDetailModal() { document.getElementById('productDetailModal').style.display='none'; }
        function closeCheckoutModal() { document.getElementById('checkoutModal').style.display='none'; }
        function closeOrderConfirmationModal() { document.getElementById('orderConfirmationModal').style.display='none'; }
        function openOrderStatus() { document.querySelector('.status-section').scrollIntoView({behavior:'smooth'}); }
        function openWhatsAppChat() { window.open(`https://wa.me/${whatsappNumber}?text=Halo%20saya%20ingin%20pesan`, '_blank'); }
        function showNotification(msg,type) { let n = document.getElementById('notification'); n.innerHTML = msg; n.style.display='block'; setTimeout(()=>n.style.display='none',2500); }
        
        function loadFooter() {
            footerData = { sections: [{ title:"TENTANG KAMI", content:"Warung BabaAfzaal menyediakan produk berkualitas dengan harga terbaik." }, { title:"KONTAK", content:"WhatsApp: +62 812-3456-7890" }], copyright:"© 2025 Warung BabaAfzaal" };
            let f = document.getElementById('footerContent');
            f.innerHTML = footerData.sections.map(s => `<div class="footer-section"><h3>${s.title}</h3><p>${s.content}</p></div>`).join('');
            document.getElementById('footerCopyright').innerHTML = footerData.copyright;
        }
        
        document.addEventListener('DOMContentLoaded', () => { loadCarousel(); loadProducts(); loadCart(); loadFooter(); });
        function loadCart() { cart = JSON.parse(localStorage.getItem('babaafzaal_cart')||'[]'); updateCartCount(); }
    </script>
</body>
</html>
